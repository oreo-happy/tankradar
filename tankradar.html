// ─── HELPERS ─────────────────────────────────────────────────────
const fmt = (p) => p?.toFixed(3).replace(".",",") ?? "—";
const toDate = (s) => new Date(s + "T00:00:00");
const daysBetween = (a, b) => Math.round((b - a) / 86400000);

function getVacationProximity(date) {
  let minDays = Infinity, closest = null;
  const d = typeof date === "string" ? toDate(date) : date;
  for (const v of VACATIONS) {
    const start = toDate(v.s);
    const diff = daysBetween(d, start);
    if (diff >= -2 && diff <= 7 && Math.abs(diff) < Math.abs(minDays)) {
      minDays = diff; closest = v;
    }
  }
  return { days: minDays, vacation: closest };
}

function getHolidayProximity(date) {
  const d = typeof date === "string" ? toDate(date) : date;
  for (const h of HOLIDAYS) {
    const hd = toDate(h.d);
    const diff = daysBetween(d, hd);
    if (diff >= -2 && diff <= 2) return { days: diff, holiday: h };
  }
  return null;
}

function forecastDelta(date, hour = 12) {
  const d = typeof date === "string" ? toDate(date) : new Date(date);
  const dow = (d.getDay() + 6) % 7;
  let delta = HOURLY_DELTA[hour] + DAILY_DELTA[dow];
  const vac = getVacationProximity(d);
  if (vac.vacation && vac.days >= -2 && vac.days <= 3) delta += 4;
  const hol = getHolidayProximity(d);
  if (hol && hol.days >= -1 && hol.days <= 0) delta += 5;
  return delta;
}

function getBestTimeToday() {
  const now = new Date();
  const h = now.getHours();
  if (h < 18) return { hour: 19, label: "19:00–20:00", wait: true };
  if (h >= 18 && h <= 20) return { hour: h, label: "Jetzt!", wait: false };
  return { hour: 19, label: "morgen 19:00", wait: true };
}

const C = {
  bg: "#06080f", card: "#0d1117", cardHover: "#151b25", border: "#1e2736",
  text: "#e2e8f0", textMuted: "#64748b", textDim: "#334155",
  amber: "#f59e0b", amberDark: "#92400e", amberGlow: "rgba(245,158,11,0.1)",

// ─── MAIN COMPONENT ─────────────────────────────────────────────
function TankRadar() {
  const [apiKey, setApiKey] = useState(() => store.get("api_key") || "");
  const [keyInput, setKeyInput] = useState("");
  const [stations, setStations] = useState([]);
  const [fuel, setFuel] = useState("e10");
  const [tab, setTab] = useState("dashboard");
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);
  const [demo, setDemo] = useState(() => !store.get("api_key"));
  const [brent, setBrent] = useState(() => parseFloat(store.get("brent")) || 72);
  const [lastFetch, setLastFetch] = useState(null);

  const saveKey = () => {
    if (!keyInput.trim()) return;
    store.set("api_key", keyInput.trim());
    setApiKey(keyInput.trim());
    setDemo(false);
  };

  const clearKey = () => {
    store.del("api_key");
    setApiKey(""); setKeyInput(""); setDemo(true); setStations([]);
  };

  const saveBrent = (v) => { setBrent(v); store.set("brent", String(v)); };

  const isFileProtocol = window.location.protocol === "file:";

  const fetchStations = useCallback(async () => {
    if (!apiKey) return;
    if (isFileProtocol) {
      setError("CORS-Fehler: Lokal als file:// geöffnet. Bitte über einen Webserver starten:\n\npython3 -m http.server 8080\n\nDann: http://localhost:8080/tankradar.html");
      return;
    }
    setLoading(true); setError(null);
    try {
      const url = `${API_BASE}/list.php?lat=${WOB.lat}&lng=${WOB.lng}&rad=${RAD}&sort=price&type=${fuel}&apikey=${apiKey}`;
      const res = await fetch(url);
      const data = await res.json();
      if (!data.ok) throw new Error(data.message || "API-Fehler");
      setStations(data.stations || []);
      setLastFetch(new Date());
      try {
        const snap = { ts: Date.now(), fuel, avg: (data.stations || []).reduce((a,b)=>a+b.price,0) / (data.stations||[]).length, min: data.stations[0]?.price, count: data.stations.length };
        let history = [];
        try { history = JSON.parse(store.get(`history_${fuel}`) || "[]"); } catch {}
        history.push(snap);
        if (history.length > 500) history = history.slice(-500);
        store.set(`history_${fuel}`, JSON.stringify(history));
      } catch {}
    } catch (e) {
      if (e.message === "Failed to fetch") {
        setError("Verbindung zur Tankerkönig-API fehlgeschlagen. Mögliche Ursachen: CORS-Blockade (file://), ungültiger API-Key oder Netzwerkproblem.");
      } else {
        setError(e.message);
      }
    }
    setLoading(false);
  }, [apiKey, fuel]);

  useEffect(() => { if (apiKey) fetchStations(); }, [apiKey, fuel, fetchStations]);

  // Auto-refresh every 5 min when live
  useEffect(() => {
    if (!apiKey) return;
    const iv = setInterval(fetchStations, 5 * 60 * 1000);
    return () => clearInterval(iv);
  }, [apiKey, fetchStations]);

  const activeStations = demo ? DEMO_STATIONS : stations;
  const openStations = activeStations.filter(s => s.isOpen && typeof s.price === "number" && s.price > 0).sort((a, b) => a.price - b.price);
  const currentAvg = openStations.length ? openStations.reduce((a, b) => a + b.price, 0) / openStations.length : 0;
  const cheapest = openStations[0];
  const spread = openStations.length > 1 ? openStations[openStations.length - 1].price - openStations[0].price : 0;
  const bestTime = getBestTimeToday();

  const forecastData = useMemo(() => {
    const base = currentAvg || 1.629;
    const days = [];
    for (let i = 0; i < 14; i++) {
      const d = new Date(); d.setDate(d.getDate() + i);
      const ds = d.toISOString().slice(0, 10);
      const dow = (d.getDay() + 6) % 7;
      const bestDelta = forecastDelta(d, 19);
      const worstDelta = forecastDelta(d, 7);
      const vac = getVacationProximity(d);
      const hol = getHolidayProximity(d);
      days.push({
        date: ds, label: `${DAY_NAMES[dow]} ${d.getDate()}.${d.getMonth()+1}`,
        best: +(base + bestDelta/100).toFixed(3), worst: +(base + worstDelta/100).toFixed(3),
        avg: +(base + (bestDelta + worstDelta)/200).toFixed(3),
        isVacation: vac.vacation && vac.days >= 0 && vac.days <= 3, vacName: vac.vacation?.name, vacState: vac.vacation?.state,
        isHoliday: !!hol, holName: hol?.holiday?.name,
      });
    }
    return days;
  }, [currentAvg]);

  const hourlyData = HOURLY_DELTA.map((d, i) => ({ hour: `${String(i).padStart(2,"0")}:00`, delta: d, fill: d <= -3 ? C.green : d >= 4 ? C.red : C.amber }));
  const dailyData = DAILY_DELTA.map((d, i) => ({ day: DAY_NAMES[i], dayFull: DAY_FULL[i], delta: d, fill: d <= -0.5 ? C.green : d >= 0.5 ? C.red : C.amber }));

  const oilImpact = useMemo(() => {
    const litresPerBarrel = 159;
    const rawCostPerLitre = (brent / litresPerBarrel) * 1.15;
    const estimated = (rawCostPerLitre + 0.6545 + 0.0865 + 0.10) * 1.19;
    return { rawCost: rawCostPerLitre, estimated: +estimated.toFixed(3) };
  }, [brent]);

  const upcomingEvents = useMemo(() => {
    const now = new Date();
    const events = [];
    for (const v of VACATIONS) {
      const start = toDate(v.s);
      const diff = daysBetween(now, start);
      if (diff >= -3 && diff <= 30) events.push({ type: "vacation", name: `${v.name} (${v.state})`, start: v.s, end: v.e, days: diff });
    }
    for (const h of HOLIDAYS) {
      const hd = toDate(h.d);
      const diff = daysBetween(now, hd);
      if (diff >= -1 && diff <= 30) events.push({ type: "holiday", name: h.name, start: h.d, days: diff });
    }
    events.sort((a, b) => a.days - b.days);
    return events.slice(0, 8);
  }, []);

  // ─── STYLES ───────────────────────────────────────────────────
  const s = {
    header: { display:"flex", alignItems:"center", justifyContent:"space-between", padding:"16px 20px", borderBottom:`1px solid ${C.border}`, flexWrap:"wrap", gap:12 },
    logo: { display:"flex", alignItems:"center", gap:10 },
    logoIcon: { width:32, height:32, borderRadius:8, background:`linear-gradient(135deg, ${C.amber}, ${C.amberDark})`, display:"flex", alignItems:"center", justifyContent:"center", fontSize:18 },
    logoText: { fontSize:18, fontWeight:700, letterSpacing:"-0.02em" },
    pill: (active) => ({ padding:"6px 14px", borderRadius:20, fontSize:12, fontWeight:600, cursor:"pointer", background: active ? C.amber : "transparent", color: active ? "#000" : C.textMuted, border: active ? "none" : `1px solid ${C.border}`, transition:"all 0.2s" }),
    tabs: { display:"flex", gap:2, padding:"0 20px", borderBottom:`1px solid ${C.border}`, overflowX:"auto" },
    tab: (active) => ({ padding:"12px 18px", fontSize:13, fontWeight: active ? 600 : 400, cursor:"pointer", color: active ? C.amber : C.textMuted, borderBottom: active ? `2px solid ${C.amber}` : "2px solid transparent", transition:"all 0.15s", whiteSpace:"nowrap" }),
    content: { padding:20, maxWidth:1200, margin:"0 auto" },
    grid: { display:"grid", gridTemplateColumns:"repeat(auto-fit, minmax(280px, 1fr))", gap:16 },
    card: { background:C.card, borderRadius:12, border:`1px solid ${C.border}`, padding:20, transition:"border-color 0.2s" },
    cardTitle: { fontSize:11, fontWeight:600, textTransform:"uppercase", letterSpacing:"0.08em", color:C.textMuted, marginBottom:12 },
    bigNum: { fontSize:40, fontWeight:800, fontFamily:"'JetBrains Mono','Fira Code',monospace", letterSpacing:"-0.03em" },
    stationRow: { display:"flex", justifyContent:"space-between", alignItems:"center", padding:"10px 0", borderBottom:`1px solid ${C.border}` },
    badge: (bg) => ({ display:"inline-block", padding:"2px 8px", borderRadius:6, fontSize:11, fontWeight:600, background:bg, color:"#000" }),
    input: { background:C.card, border:`1px solid ${C.border}`, borderRadius:8, padding:"8px 12px", color:C.text, fontSize:13, outline:"none", width:"100%" },
    btn: { background:C.amber, color:"#000", border:"none", borderRadius:8, padding:"8px 16px", fontSize:13, fontWeight:600, cursor:"pointer" },
    btnMuted: { background:"transparent", color:C.textMuted, border:`1px solid ${C.border}`, borderRadius:8, padding:"8px 16px", fontSize:13, cursor:"pointer" },
  };

  const TABS = [
    { id:"dashboard", label:"Dashboard" },
    { id:"stations", label:"Tankstellen" },
    { id:"patterns", label:"Muster" },
    { id:"forecast", label:"Prognose" },
    { id:"settings", label:"⚙" },
  ];

  // ─── DASHBOARD ────────────────────────────────────────────────
  const renderDashboard = () => (
    <div style={{display:"flex",flexDirection:"column",gap:16}}>
      {isFileProtocol && (
        <div style={{...s.card,background:"rgba(244,63,94,0.08)",borderColor:C.red}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}><span style={{fontSize:16}}>🚫</span><span style={{fontWeight:600,color:C.red}}>file:// erkannt — API-Zugriff blockiert</span></div>
          <p style={{color:C.textMuted,margin:0,fontSize:13,lineHeight:1.7}}>
            Browser blockieren API-Aufrufe von lokalen Dateien (CORS). Starte einen lokalen Server:<br/>
            <code style={{background:C.bg,padding:"4px 8px",borderRadius:4,fontSize:12,display:"inline-block",marginTop:6}}>python3 -m http.server 8080</code><br/>
            <span style={{fontSize:12,marginTop:4,display:"inline-block"}}>Dann öffne: <strong>http://localhost:8080/tankradar.html</strong></span>
          </p>
        </div>
      )}
      {demo && !isFileProtocol && (
        <div style={{...s.card,background:C.amberGlow,borderColor:C.amber}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}><span style={{fontSize:16}}>⚠</span><span style={{fontWeight:600}}>Demo-Modus</span></div>
          <p style={{color:C.textMuted,margin:0,fontSize:13}}>Zeigt Beispieldaten. Gehe zu ⚙ Einstellungen und trage deinen Tankerkönig-API-Key ein.</p>
        </div>
      )}
      {error && !isFileProtocol && (
        <div style={{...s.card,background:"rgba(244,63,94,0.06)",borderColor:C.red}}>
          <div style={{color:C.red,fontSize:13,whiteSpace:"pre-wrap",lineHeight:1.6}}>⚠ {error}</div>
        </div>
      )}
      <div style={s.grid}>
        <div style={s.card}>
          <div style={s.cardTitle}>Günstigster Preis · {fuel.toUpperCase()}</div>
          <div style={{...s.bigNum,color:C.green}}>{fmt(cheapest?.price)} €</div>
          <div style={{color:C.textMuted,fontSize:12,marginTop:4}}>{cheapest?.name} · {cheapest?.dist?.toFixed(1)} km</div>
        </div>
        <div style={s.card}>
          <div style={s.cardTitle}>Durchschnitt · {RAD} km</div>
          <div style={{...s.bigNum,color:C.amber}}>{fmt(currentAvg)} €</div>
          <div style={{color:C.textMuted,fontSize:12,marginTop:4}}>Spread: {(spread*100).toFixed(1)} ct · {openStations.length} offen</div>
        </div>
        <div style={s.card}>
          <div style={s.cardTitle}>Bester Zeitpunkt</div>
          <div style={{...s.bigNum,fontSize:28,color:bestTime.wait?C.blue:C.green}}>{bestTime.label}</div>
          <div style={{color:C.textMuted,fontSize:12,marginTop:4}}>{bestTime.wait?"Abends tanken spart 8–14 ct/L":"Guter Zeitpunkt!"}</div>
        </div>
      </div>
      {upcomingEvents.length > 0 && (
        <div style={s.card}>
          <div style={s.cardTitle}>Anstehende Preistreiber</div>
          <div style={{display:"flex",flexDirection:"column",gap:6}}>
            {upcomingEvents.slice(0,5).map((ev,i)=>(
              <div key={i} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"6px 0",borderBottom:i<Math.min(upcomingEvents.length-1,4)?`1px solid ${C.border}`:"none"}}>
                <div style={{display:"flex",alignItems:"center",gap:10}}>
                  <span style={s.badge(ev.type==="holiday"?C.red:C.amber)}>{ev.type==="holiday"?"Feiertag":"Ferien"}</span>
                  <span style={{fontSize:13}}>{ev.name}</span>
                </div>
                <span style={{color:C.textMuted,fontSize:12,fontFamily:"monospace"}}>{ev.days<=0?"Jetzt!":ev.days===1?"morgen":`in ${ev.days} Tagen`}</span>
              </div>
            ))}
          </div>
        </div>
      )}
      <div style={s.card}>
        <div style={s.cardTitle}>Top 5 günstigste</div>
        {openStations.slice(0,5).map((st,i)=>(
          <div key={st.id} style={s.stationRow}>
            <div>
              <div style={{fontWeight:600,fontSize:13}}><span style={{color:C.textMuted,fontFamily:"monospace",marginRight:8}}>#{i+1}</span>{st.brand||st.name}</div>
              <div style={{color:C.textMuted,fontSize:12}}>{st.place} · {st.dist?.toFixed(1)} km</div>
            </div>
            <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:18,fontWeight:700,color:i===0?C.green:C.text}}>{fmt(st.price)}</div>
          </div>
        ))}
      </div>
    </div>
  );

  // ─── STATIONS ─────────────────────────────────────────────────
  const renderStations = () => (
    <div style={s.card}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <div style={s.cardTitle}>Alle Tankstellen · {fuel.toUpperCase()} · {RAD} km</div>
        {!demo && <button onClick={fetchStations} style={s.btnMuted}>{loading?"Lade…":"↻ Aktualisieren"}</button>}
      </div>
      {error && <div style={{color:C.red,marginBottom:12,fontSize:13,whiteSpace:"pre-wrap",background:"rgba(244,63,94,0.06)",padding:12,borderRadius:8,lineHeight:1.6}}>⚠ {error}</div>}
      {[...activeStations].sort((a,b)=>{const ap=typeof a.price==="number"&&a.price>0?a.price:Infinity;const bp=typeof b.price==="number"&&b.price>0?b.price:Infinity;return ap-bp;}).map((st,i)=>{const hasPrice=typeof st.price==="number"&&st.price>0;return(
        <div key={st.id} style={{...s.stationRow,opacity:st.isOpen?(hasPrice?1:0.6):0.4}}>
          <div style={{flex:1}}>
            <div style={{fontWeight:600,fontSize:13,display:"flex",alignItems:"center",gap:8}}>
              {st.brand && <span style={s.badge(C.border)}>{st.brand}</span>}
              {st.name}
              {!st.isOpen && <span style={{...s.badge(C.redDark),color:C.red}}>geschlossen</span>}
              {st.isOpen && !hasPrice && <span style={{...s.badge(C.border),color:C.textMuted}}>kein {fuel.toUpperCase()}</span>}
            </div>
            <div style={{color:C.textMuted,fontSize:12,marginTop:2}}>{st.street}, {st.place} · {st.dist?.toFixed(1)} km</div>
          </div>
          <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:20,fontWeight:700,color:!hasPrice?C.textDim:i===0?C.green:C.text}}>{hasPrice?fmt(st.price):"—"}</div>
        </div>
      );})}
      {lastFetch && <div style={{color:C.textDim,fontSize:11,marginTop:12}}>Zuletzt: {lastFetch.toLocaleTimeString("de-DE")}</div>}
    </div>
  );

  // ─── PATTERNS ─────────────────────────────────────────────────
  const renderPatterns = () => (
    <div style={{display:"flex",flexDirection:"column",gap:16}}>
      <div style={s.card}>
        <div style={s.cardTitle}>Tagesmuster — Preisabweichung (ct/L)</div>
        <div style={{fontSize:12,color:C.textMuted,marginBottom:16}}>Quelle: Bundeskartellamt-Markttransparenzstelle</div>
        <ResponsiveContainer width="100%" height={250}>
          <BarChart data={hourlyData} margin={{top:5,right:5,bottom:5,left:-10}}>
            <CartesianGrid strokeDasharray="3 3" stroke={C.border}/>
            <XAxis dataKey="hour" tick={{fill:C.textMuted,fontSize:10}} interval={2}/>
            <YAxis tick={{fill:C.textMuted,fontSize:10}} tickFormatter={v=>`${v>0?"+":""}${v}`}/>
            <Tooltip contentStyle={{background:C.card,border:`1px solid ${C.border}`,borderRadius:8,fontSize:12}} labelStyle={{color:C.text}} formatter={v=>[`${v>0?"+":""}${v} ct/L`,"Abweichung"]}/>
            <Bar dataKey="delta" radius={[4,4,0,0]}>{hourlyData.map((e,i)=><Cell key={i} fill={e.fill} fillOpacity={0.85}/>)}</Bar>
          </BarChart>
        </ResponsiveContainer>
        <div style={{display:"flex",gap:20,marginTop:12,justifyContent:"center"}}>
          {[{c:C.green,l:"Günstig (≤ -3 ct)"},{c:C.amber,l:"Neutral"},{c:C.red,l:"Teuer (≥ +4 ct)"}].map(x=>(
            <div key={x.l} style={{display:"flex",alignItems:"center",gap:6,fontSize:11,color:C.textMuted}}>
              <div style={{width:10,height:10,borderRadius:3,background:x.c}}/>{x.l}
            </div>
          ))}
        </div>
      </div>
      <div style={s.grid}>
        <div style={s.card}>
          <div style={s.cardTitle}>Wochenmuster (ct/L)</div>
          <ResponsiveContainer width="100%" height={200}>
            <BarChart data={dailyData} margin={{top:5,right:5,bottom:5,left:-10}}>
              <CartesianGrid strokeDasharray="3 3" stroke={C.border}/>
              <XAxis dataKey="day" tick={{fill:C.textMuted,fontSize:11}}/>
              <YAxis tick={{fill:C.textMuted,fontSize:10}} tickFormatter={v=>`${v>0?"+":""}${v}`} domain={[-2,2]}/>
              <Tooltip contentStyle={{background:C.card,border:`1px solid ${C.border}`,borderRadius:8,fontSize:12}} formatter={v=>[`${v>0?"+":""}${v} ct/L`,"Abweichung"]} labelFormatter={(l,p)=>p?.[0]?.payload?.dayFull||l}/>
              <Bar dataKey="delta" radius={[4,4,0,0]}>{dailyData.map((e,i)=><Cell key={i} fill={e.fill} fillOpacity={0.85}/>)}</Bar>
            </BarChart>
          </ResponsiveContainer>
        </div>
        <div style={s.card}>
          <div style={s.cardTitle}>Zusammenfassung</div>
          <div style={{display:"flex",flexDirection:"column",gap:14,marginTop:8}}>
            {[
              {icon:"🟢",title:"Günstigste Zeit",text:"18:00–22:00, Mo + Di"},
              {icon:"🔴",title:"Teuerste Zeit",text:"06:00–09:00, Fr"},
              {icon:"💡",title:"Spartipp",text:"Mo/Di-Abend spart bis 14 ct/L vs Fr-Morgen"},
              {icon:"⚠️",title:"Ferienzuschlag",text:"2–3 Tage vorher +3–6 ct/L"},
            ].map((item,i)=>(
              <div key={i} style={{display:"flex",gap:10,alignItems:"flex-start"}}>
                <span style={{fontSize:16,flexShrink:0}}>{item.icon}</span>
                <div><div style={{fontWeight:600,fontSize:13}}>{item.title}</div><div style={{color:C.textMuted,fontSize:12}}>{item.text}</div></div>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );

  // ─── FORECAST ─────────────────────────────────────────────────
  const renderForecast = () => {
    const todayBest = forecastData[0]?.best;
    const minInWeek = Math.min(...forecastData.slice(0,7).map(d=>d.best));
    const minDay = forecastData.slice(0,7).find(d=>d.best===minInWeek);
    const fillNow = todayBest <= minInWeek + 0.005;
    return (
      <div style={{display:"flex",flexDirection:"column",gap:16}}>
        <div style={{...s.card,borderColor:fillNow?C.green:C.blue,background:fillNow?"rgba(16,185,129,0.05)":"rgba(59,130,246,0.05)"}}>
          <div style={{display:"flex",alignItems:"center",gap:12}}>
            <div style={{width:48,height:48,borderRadius:12,background:fillNow?C.green:C.blue,display:"flex",alignItems:"center",justifyContent:"center",fontSize:24,flexShrink:0}}>{fillNow?"✓":"⏳"}</div>
            <div>
              <div style={{fontWeight:700,fontSize:18}}>{fillNow?"Jetzt tanken!":`Warten — ${minDay?.label} wird günstiger`}</div>
              <div style={{color:C.textMuted,fontSize:13,marginTop:2}}>
                {fillNow?`Heute Abend ca. ${fmt(todayBest)} €/L`:`Geschätzt ${fmt(minInWeek)} €/L am ${minDay?.label} (${((todayBest-minInWeek)*100).toFixed(1)} ct Ersparnis)`}
              </div>
            </div>
          </div>
        </div>
        <div style={s.card}>
          <div style={s.cardTitle}>14-Tage Prognose — {fuel.toUpperCase()}</div>
          <ResponsiveContainer width="100%" height={280}>
            <AreaChart data={forecastData} margin={{top:10,right:10,bottom:5,left:-10}}>
              <defs><linearGradient id="gArea" x1="0" y1="0" x2="0" y2="1"><stop offset="5%" stopColor={C.amber} stopOpacity={0.15}/><stop offset="95%" stopColor={C.amber} stopOpacity={0}/></linearGradient></defs>
              <CartesianGrid strokeDasharray="3 3" stroke={C.border}/>
              <XAxis dataKey="label" tick={{fill:C.textMuted,fontSize:10}} interval={1} angle={-35} textAnchor="end" height={50}/>
              <YAxis tick={{fill:C.textMuted,fontSize:10}} tickFormatter={v=>v.toFixed(2)} domain={["dataMin - 0.02","dataMax + 0.02"]}/>
              <Tooltip contentStyle={{background:C.card,border:`1px solid ${C.border}`,borderRadius:8,fontSize:12}} formatter={(v,name)=>[fmt(v)+" €/L",name==="best"?"Abends":name==="worst"?"Morgens":"Durchschnitt"]}/>
              <Area type="monotone" dataKey="worst" stroke={C.red} strokeWidth={1.5} fillOpacity={0} strokeDasharray="4 4" dot={false}/>
              <Area type="monotone" dataKey="avg" stroke={C.amber} strokeWidth={2} fill="url(#gArea)" dot={(props)=>{
                const {cx,cy,payload}=props;
                if(payload.isHoliday||payload.isVacation) return <circle cx={cx} cy={cy} r={5} fill={payload.isHoliday?C.red:C.amber} stroke={C.bg} strokeWidth={2}/>;
                return <circle cx={cx} cy={cy} r={3} fill={C.amber}/>;
              }}/>
              <Area type="monotone" dataKey="best" stroke={C.green} strokeWidth={1.5} fillOpacity={0} strokeDasharray="4 4" dot={false}/>
            </AreaChart>
          </ResponsiveContainer>
          <div style={{display:"flex",gap:16,marginTop:8,justifyContent:"center",flexWrap:"wrap"}}>
            {[{c:C.green,l:"Abends (best)"},{c:C.amber,l:"Durchschnitt"},{c:C.red,l:"Morgens (worst)"},{c:C.red,l:"● Feiertag"},{c:C.amber,l:"● Ferien"}].map(x=>(
              <div key={x.l} style={{display:"flex",alignItems:"center",gap:4,fontSize:10,color:C.textMuted}}>
                <div style={{width:12,height:2,background:x.c,borderRadius:1}}/>{x.l}
              </div>
            ))}
          </div>
        </div>
        <div style={s.card}>
          <div style={s.cardTitle}>Tagesdetails</div>
          <div style={{overflowX:"auto"}}>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
              <thead><tr style={{borderBottom:`2px solid ${C.border}`}}>
                {["Tag","Günstigst","Teuerst","Event"].map(h=><th key={h} style={{textAlign:"left",padding:"8px 12px",color:C.textMuted,fontWeight:600,fontSize:11,textTransform:"uppercase",letterSpacing:"0.05em"}}>{h}</th>)}
              </tr></thead>
              <tbody>{forecastData.slice(0,10).map((d,i)=>(
                <tr key={d.date} style={{borderBottom:`1px solid ${C.border}`,background:i===0?"rgba(245,158,11,0.03)":"transparent"}}>
                  <td style={{padding:"8px 12px",fontWeight:i===0?700:400}}>{d.label}{i===0&&" (heute)"}</td>
                  <td style={{padding:"8px 12px",fontFamily:"monospace",color:d.best===minInWeek?C.green:C.text,fontWeight:d.best===minInWeek?700:400}}>{fmt(d.best)} €</td>
                  <td style={{padding:"8px 12px",fontFamily:"monospace",color:C.textMuted}}>{fmt(d.worst)} €</td>
                  <td style={{padding:"8px 12px"}}>
                    {d.isHoliday&&<span style={s.badge(C.red)}>{d.holName}</span>}
                    {d.isVacation&&<span style={{...s.badge(C.amber),marginLeft:d.isHoliday?6:0}}>{d.vacName} ({d.vacState})</span>}
                  </td>
                </tr>
              ))}</tbody>
            </table>
          </div>
        </div>
        <div style={s.card}>
          <div style={s.cardTitle}>Rohölpreis-Einfluss (Brent)</div>
          <div style={{display:"flex",gap:20,alignItems:"center",flexWrap:"wrap"}}>
            <div>
              <div style={{color:C.textMuted,fontSize:12,marginBottom:4}}>Brent ($/bbl)</div>
              <input type="number" value={brent} onChange={e=>saveBrent(parseFloat(e.target.value)||0)} style={{...s.input,width:100,fontFamily:"monospace",fontSize:18,fontWeight:700}}/>
            </div>
            <div style={{fontSize:24,color:C.textDim}}>→</div>
            <div>
              <div style={{color:C.textMuted,fontSize:12,marginBottom:4}}>Rohkosten/L</div>
              <div style={{fontFamily:"monospace",fontSize:18,fontWeight:700}}>{(oilImpact.rawCost*100).toFixed(1)} ct</div>
            </div>
            <div style={{fontSize:24,color:C.textDim}}>→</div>
            <div>
              <div style={{color:C.textMuted,fontSize:12,marginBottom:4}}>Endpreis (geschätzt)</div>
              <div style={{fontFamily:"monospace",fontSize:18,fontWeight:700,color:C.amber}}>{fmt(oilImpact.estimated)} €</div>
            </div>
          </div>
          <div style={{color:C.textMuted,fontSize:11,marginTop:12,lineHeight:1.6}}>Energiesteuer 65,45 ct + CO₂ 8,65 ct + Marge ~10 ct + 19% MwSt. Verzögerung Rohöl → Zapfsäule: 2–4 Wochen.</div>
        </div>
      </div>
    );
  };

  // ─── SETTINGS ─────────────────────────────────────────────────
  const renderSettings = () => (
    <div style={{display:"flex",flexDirection:"column",gap:16,maxWidth:500}}>
      <div style={s.card}>
        <div style={s.cardTitle}>Tankerkönig API-Key</div>
        <p style={{color:C.textMuted,fontSize:13,margin:"0 0 12px"}}>Kostenlos: <a href="https://creativecommons.tankerkoenig.de" target="_blank" rel="noopener" style={{color:C.amber,textDecoration:"none"}}>creativecommons.tankerkoenig.de</a></p>
        {apiKey ? (
          <div>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
              <span style={s.badge(C.green)}>✓ Verbunden</span>
              <span style={{color:C.textMuted,fontFamily:"monospace",fontSize:12}}>{apiKey.slice(0,8)}…</span>
            </div>
            <button onClick={clearKey} style={s.btnMuted}>Key entfernen</button>
          </div>
        ) : (
          <div style={{display:"flex",gap:8}}>
            <input type="text" value={keyInput} onChange={e=>setKeyInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&saveKey()} placeholder="xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx" style={{...s.input,fontFamily:"monospace"}}/>
            <button onClick={saveKey} style={s.btn}>Speichern</button>
          </div>
        )}
      </div>
      <div style={s.card}>
        <div style={s.cardTitle}>Datenquellen</div>
        <div style={{display:"flex",flexDirection:"column",gap:8,fontSize:13,color:C.textMuted}}>
          <div>📊 <strong>Live-Preise:</strong> MTS-K via Tankerkönig</div>
          <div>📈 <strong>Muster:</strong> Bundeskartellamt MTS</div>
          <div>🏖 <strong>Ferien:</strong> NI, ST, NW, BB, TH 2025–26</div>
          <div>🛢 <strong>Rohöl:</strong> Brent Crude manuell</div>
        </div>
      </div>
    </div>
  );

  return (
    <div>
      <div style={s.header}>
        <div style={s.logo}>
          <div style={s.logoIcon}>⛽</div>
          <div><div style={s.logoText}>TankRadar</div><div style={{fontSize:11,color:C.textMuted,marginTop:-2}}>Wolfsburg · {RAD} km</div></div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
          {["e10","e5"].map(f=><div key={f} style={s.pill(fuel===f)} onClick={()=>setFuel(f)}>{f.toUpperCase()}</div>)}
          {!demo && <div style={{fontSize:11,color:C.textDim,marginLeft:8,fontFamily:"monospace"}}>{loading?"Lade…":lastFetch?lastFetch.toLocaleTimeString("de-DE",{hour:"2-digit",minute:"2-digit"}):""}</div>}
        </div>
      </div>
      <div style={s.tabs}>{TABS.map(t=><div key={t.id} style={s.tab(tab===t.id)} onClick={()=>setTab(t.id)}>{t.label}</div>)}</div>
      <div style={s.content}>
        {tab==="dashboard"&&renderDashboard()}
        {tab==="stations"&&renderStations()}
        {tab==="patterns"&&renderPatterns()}
        {tab==="forecast"&&renderForecast()}
        {tab==="settings"&&renderSettings()}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(TankRadar));
</script>
</body>
</html>
