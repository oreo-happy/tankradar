<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--ease:cubic-bezier(.4,0,.2,1)}
body{font-family:'Outfit','Segoe UI',system-ui,sans-serif;font-size:14px;transition:background .4s var(--ease),color .3s var(--ease);-webkit-font-smoothing:antialiased}
body.dark{background:#000;color:#e8ecf1}
body.light{background:#f0f2f5;color:#1a1d23}
#root{min-height:100vh;min-height:100dvh}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
.dark ::-webkit-scrollbar-thumb{background:#1a1d23;border-radius:3px}
.light ::-webkit-scrollbar-thumb{background:#c4c8d0;border-radius:3px}
input[type=number]::-webkit-inner-spin-button{opacity:1}
/* Leaflet */
.leaflet-container{border-radius:16px;z-index:1}
.station-popup .leaflet-popup-content-wrapper{border-radius:12px;box-shadow:0 12px 40px rgba(0,0,0,.5)}
.dark .station-popup .leaflet-popup-content-wrapper{background:rgba(15,17,22,.95);color:#e8ecf1;border:1px solid rgba(255,255,255,.06);backdrop-filter:blur(20px)}
.light .station-popup .leaflet-popup-content-wrapper{background:rgba(255,255,255,.95);color:#1a1d23;border:1px solid rgba(0,0,0,.08);backdrop-filter:blur(20px)}
.dark .station-popup .leaflet-popup-tip{background:rgba(15,17,22,.95)}
.light .station-popup .leaflet-popup-tip{background:rgba(255,255,255,.95)}
.price-marker{background:none;border:none}
.price-label{padding:3px 7px;border-radius:8px;font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;white-space:nowrap;text-align:center;box-shadow:0 4px 12px rgba(0,0,0,.4);backdrop-filter:blur(8px)}
/* Slider */
.slide-range{-webkit-appearance:none;appearance:none;width:100%;height:5px;border-radius:3px;outline:none;cursor:pointer;transition:background .3s}
.dark .slide-range{background:rgba(255,255,255,.06)}
.light .slide-range{background:rgba(0,0,0,.1)}
.slide-range::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:#10b981;cursor:pointer;border:3px solid #000;box-shadow:0 0 10px rgba(16,185,129,.4);transition:box-shadow .2s}
.light .slide-range::-webkit-slider-thumb{border-color:#f0f2f5}
.slide-range::-webkit-slider-thumb:hover{box-shadow:0 0 16px rgba(16,185,129,.6)}
/* Animations */
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes glow{0%,100%{box-shadow:0 0 8px rgba(16,185,129,.2)}50%{box-shadow:0 0 20px rgba(16,185,129,.4)}}
.pulsing{animation:pulse 2s infinite}
.fade-up{animation:fadeUp .4s var(--ease) both}
.glow{animation:glow 3s ease-in-out infinite}
/* Modal overlay */
.modal-overlay{position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;padding:16px;animation:fadeUp .25s var(--ease);overscroll-behavior:contain;touch-action:none}
.dark .modal-overlay{background:rgba(0,0,0,.8);backdrop-filter:blur(12px)}
.light .modal-overlay{background:rgba(0,0,0,.4);backdrop-filter:blur(12px)}
body.modal-open{overflow:hidden;-webkit-overflow-scrolling:auto}
html.modal-open{overflow:hidden}
/* Focus */
input:focus,button:focus-visible{outline:2px solid rgba(16,185,129,.5);outline-offset:2px}
/* Selection */
::selection{background:rgba(16,185,129,.3)}
/* Comparison badge */
.comp-badge{display:inline-flex;align-items:center;gap:2px;padding:1px 6px;border-radius:4px;font-size:9px;font-weight:700;font-family:'JetBrains Mono',monospace;letter-spacing:-.02em}
/* Favorite star */
.fav-star{cursor:pointer;transition:transform .2s var(--ease),color .2s;font-size:16px;user-select:none}
.fav-star:hover{transform:scale(1.3)}
.fav-star:active{transform:scale(.9)}
/* Bottom nav */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:100;display:flex;justify-content:space-around;padding:12px 0 calc(16px + env(safe-area-inset-bottom,0px));border-top:1px solid rgba(255,255,255,.06)}
.dark .bottom-nav{background:rgba(8,8,10,.95);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}
.light .bottom-nav{background:rgba(255,255,255,.95);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top-color:rgba(0,0,0,.08)}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 0 4px;cursor:pointer;transition:all .2s;-webkit-tap-highlight-color:transparent;user-select:none;flex:1;border-radius:8px}
.nav-item:hover{background:rgba(255,255,255,.04)}
.light .nav-item:hover{background:rgba(0,0,0,.04)}
.nav-icon{font-size:20px;line-height:1}
.nav-label{font-size:10px;font-weight:600;letter-spacing:.02em}
/* Sub toggle */
.sub-toggle{display:flex;gap:2px;padding:2px;border-radius:10px;margin-bottom:12px}

  {id:"amex",name:"AmEx Cashback",desc:"Kreditkarten-Cashback",icon:"💳",type:"percent",percent:1,allBrands:true},

];

function calcDiscount(brand,pricePerL,activeCards){
  let totalCt=0;let details=[];
  for(const ac of activeCards){
    const def=DISCOUNT_CARDS.find(d=>d.id===ac.id);
    if(!def)continue;
    if(def.type==="multi"){
      for(const rule of def.rules){
        if(rule.brands.some(b=>brand?.toUpperCase().includes(b.toUpperCase()))){
          totalCt+=rule.discountCt;
          details.push({name:def.name,ct:rule.discountCt});
          break;
        }
      }
    }else if(def.type==="points"){
      const mult=ac.multiplier||def.defaultMultiplier;
      const pointsPerL=def.basePointsPer*mult;
      const eurPerL=pointsPerL*def.pointValueEur;
      const ct=+(eurPerL*100).toFixed(2);
      if(def.brands.some(b=>brand?.toUpperCase().includes(b.toUpperCase()))){
        totalCt+=ct;
        details.push({name:`${def.name} (${mult}x)`,ct});
      }
    }else if(def.type==="flat"){
      const ct=ac.discountCt||def.discountCt||0;
      if(ct>0&&(def.allBrands||def.brands?.some(b=>brand?.toUpperCase().includes(b.toUpperCase())))){
        totalCt+=ct;
        details.push({name:def.name,ct});
      }
    }else if(def.type==="percent"){
      const pct=ac.percent||def.percent||0;
      const ct=+(pricePerL*pct).toFixed(2);
      if(ct>0){totalCt+=ct;details.push({name:`${def.name} (${pct}%)`,ct})}
    }
  }
  return{totalCt:+totalCt.toFixed(2),details,adjustedPrice:+(pricePerL-totalCt/100).toFixed(3)};
}

function vacProx(date){let m=Infinity,c=null;const d=typeof date==="string"?toDate(date):date;for(const v of VACATIONS){const s=toDate(v.s),diff=daysB(d,s);if(diff>=-2&&diff<=7&&Math.abs(diff)<Math.abs(m)){m=diff;c=v}}return{days:m,vac:c}}
function holProx(date){const d=typeof date==="string"?toDate(date):date;for(const h of HOLIDAYS){const diff=daysB(d,toDate(h.d));if(diff>=-2&&diff<=2)return{days:diff,hol:h}}return null}
function fcDelta(date,hour=12){const d=typeof date==="string"?toDate(date):new Date(date);const dow=(d.getDay()+6)%7;let delta=HOURLY_DELTA[hour]+DAILY_DELTA[dow];const v=vacProx(d);if(v.vac&&v.days>=-2&&v.days<=3)delta+=4;const h=holProx(d);if(h&&h.days>=-1&&h.days<=0)delta+=5;return delta}
function bestTimeNow(){const h=new Date().getHours();if(h<18)return{label:"19:00–20:00",wait:true};if(h<=20)return{label:"Jetzt!",wait:false};return{label:"morgen 19:00",wait:true}}

    const dd=detailData;
    const disc=activeCards.length?calcDiscount(st.brand,st.price,activeCards):null;
    const bb=brandBadge(st.brand,32);
    // Per-station history: merge API + localStorage, deduplicate
    const localHist=S.json(`st_hist_${fuel}`,{});
    const localEntries=(localHist[st.id]||[]);
    const apiEntries=stationHistory||[];
    const allEntries=[...apiEntries,...localEntries].sort((a,b)=>a.t-b.t);
    const deduped=[];const seen=new Set();
    for(const e of allEntries){const bk=Math.floor(e.t/300000);if(!seen.has(bk)){seen.add(bk);deduped.push(e)}}
    const history=deduped.map(h=>({
      time:new Date(h.t).toLocaleDateString("de-DE",{day:"2-digit",month:"2-digit"})+"\n"+new Date(h.t).toLocaleTimeString("de-DE",{hour:"2-digit",minute:"2-digit"}),
      price:h.p,
      ts:h.t,
    }));
    const lastUpdate=history.length?new Date(history[history.length-1].ts):null;

      <div className="modal-overlay" onClick={()=>setDetailStation(null)}>

            <div style={{background:C.bg,borderRadius:8,padding:12,marginBottom:12,textAlign:"center"}}>
              {disc&&disc.totalCt>0?(
                <div>

                  <CartesianGrid strokeDasharray="3 3" stroke={C.border}/>

                  <YAxis tick={{fill:C.muted,fontSize:9}} domain={["dataMin-0.02","dataMax+0.02"]} tickFormatter={v=>v.toFixed(2)}/>
                  <Tooltip contentStyle={{background:C.card,border:`1px solid ${C.border}`,borderRadius:8,fontSize:11}} formatter={v=>[fmt(v)+" €/L"]}/>
                  <Line type="stepAfter" dataKey="price" stroke={C.amber} strokeWidth={2} dot={false}/>
                </LineChart>
              </ResponsiveContainer>
              <div style={{display:"flex",justifyContent:"space-between",fontSize:10,color:C.dim,flexWrap:"wrap",gap:4}}>
                <span>{history.length} {lang==="de"?"Datenpunkte":"data points"} {apiEntries.length>0?`(${apiEntries.length} Server + ${localEntries.length} Local)`:""}</span>
                <span>Min: {fmt(Math.min(...history.map(h=>h.price)))} · Max: {fmt(Math.max(...history.map(h=>h.price)))}</span>

            </div>

          <div style={{display:"flex",gap:8,marginTop:8}}>
            <button style={s.btn} onClick={()=>window.open(`https://www.google.com/maps/dir/?api=1&destination=${st.lat},${st.lng}`,"_blank")}>🧭 Navigation</button>
            <button style={s.btnM} onClick={()=>setDetailStation(null)}>{lang==="de"?"Schließen":"Close"}</button>
          </div>
        </div>
      </div>
    );
  };

  // ─── HEATMAP DATA ──────────────────────────────────────────
  const TIME_BLOCKS=[
    {id:0,hours:[0,1,2],label:{de:"Nacht",en:"Night",tr:"Gece"},short:"00–02"},
    {id:1,hours:[3,4,5],label:{de:"Früh",en:"Early",tr:"Erken"},short:"03–05"},
    {id:2,hours:[6,7,8],label:{de:"Morgens",en:"Morning",tr:"Sabah"},short:"06–08"},
    {id:3,hours:[9,10,11],label:{de:"Vormittag",en:"Late AM",tr:"Öğleden Ö."},short:"09–11"},
    {id:4,hours:[12,13,14],label:{de:"Mittag",en:"Midday",tr:"Öğle"},short:"12–14"},
    {id:5,hours:[15,16,17],label:{de:"Nachmittag",en:"Afternoon",tr:"Öğleden S."},short:"15–17"},
    {id:6,hours:[18,19,20],label:{de:"Abends",en:"Evening",tr:"Akşam"},short:"18–20"},
    {id:7,hours:[21,22,23],label:{de:"Spät",en:"Late",tr:"Geç"},short:"21–23"},
  ];
  const heatmapData=useMemo(()=>{
    const hDeltas=isMLActive?mlHourly:HOURLY_DELTA;
    const dDeltas=isMLActive?mlDaily:DAILY_DELTA;
    const cells=[];
    for(let d=0;d<7;d++){
      for(const blk of TIME_BLOCKS){
        const avg=blk.hours.reduce((a,h)=>a+(+(hDeltas[h]||0)),0)/blk.hours.length;
        const val=+(avg+(+(dDeltas[d]||0))).toFixed(1);
        cells.push({day:d,block:blk.id,hours:blk.hours,val});
      }
    }
    return cells;
  },[mlModel]);
  const heatMin=Math.min(...heatmapData.map(c=>c.val));
  const heatMax=Math.max(...heatmapData.map(c=>c.val));
  const heatColor=(val)=>{
    const norm=(val-heatMin)/(heatMax-heatMin);
    if(norm<0.2)return theme==="dark"?"#064e3b":"#d1fae5";
    if(norm<0.35)return theme==="dark"?"#065f46":"#a7f3d0";
    if(norm<0.5)return theme==="dark"?"#14532d":"#bbf7d0";
    if(norm<0.6)return theme==="dark"?"#422006":"#fef3c7";
    if(norm<0.7)return theme==="dark"?"#78350f":"#fde68a";
    if(norm<0.8)return theme==="dark"?"#7f1d1d":"#fecaca";
    if(norm<0.9)return theme==="dark"?"#991b1b":"#fca5a5";
    return theme==="dark"?"#b91c1c":"#f87171";
  };
  const heatTextColor=(val)=>{
    const norm=(val-heatMin)/(heatMax-heatMin);
    return norm<0.5?(theme==="dark"?"#86efac":"#166534"):(theme==="dark"?"#fca5a5":"#991b1b");
  };
  const [selectedCell,setSelectedCell]=useState(null);
  const rankedCells=useMemo(()=>[...heatmapData].sort((a,b)=>a.val-b.val),[heatmapData]);

  const renderPatterns=()=>(

        {/* Selected cell detail */}

                  const isTop3=rank<=3;
                  return(
                    <td key={blk.id} onClick={()=>setSelectedCell(isSelected?null:{d,b:blk.id})}
                      style={{background:bg,borderRadius:6,height:36,cursor:"pointer",textAlign:"center",verticalAlign:"middle",

                        transition:"all .15s",padding:0,position:"relative"}}>
                      <div style={{fontSize:10,fontWeight:700,color:heatTextColor(val),lineHeight:1}}>
                        {val>0?"+":""}{val}

                    </td>
                  );
                })}
              </tr>
            ))}
          </tbody>
        </table>
        {/* Legend */}
        <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:6,marginTop:10,flexWrap:"wrap"}}>

        </div>
      </div>
      {/* Existing charts */}
      <div style={s.card}>
        <div style={s.cardT}>{t("dailyPattern",lang)}</div>

  // ─── FORECAST ───────────────────────────────────────────────
  const renderForecast=()=>{
    const tb=forecastData[0]?.best;
    const mw=Math.min(...forecastData.slice(0,7).map(d=>d.best));
    const md=forecastData.slice(0,7).find(d=>d.best===mw);
    const fn=tb<=mw+.005;
    // Smart fill: combine forecast with tank level
    const rangeKm=tankAdvisor.rangeKm||0;
    const daysUntilCheap=md?forecastData.indexOf(md):0;
    const dailyKm=30; // rough estimate
    const canWait=rangeKm>daysUntilCheap*dailyKm;
    const savingsOnFull=+((tb-mw)*(tankSize||45)).toFixed(2);
    return(
      <div style={{display:"flex",flexDirection:"column",gap:12}}>
        <Hint id="fc_ml" emoji="🧠">{lang==="de"?`Prognosen basieren auf echten Daten von ${mlModel?.stations_trained||77} Stationen — keine Schätzungen.`:`Forecasts use real data from ${mlModel?.stations_trained||77} stations — not estimates.`}</Hint>
        <Hint id="fc_brent" emoji="🛢">{lang==="de"?"Ölpreise steigen schnell an der Zapfsäule, fallen aber langsam. Wir tracken beide Verzögerungen.":"Oil prices rise fast at the pump but drop slowly. We track both lags."}</Hint>
        <div style={{...s.card,borderColor:fn?C.green:C.blue,background:fn?"rgba(16,185,129,.04)":"rgba(59,130,246,.04)"}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <div style={{width:40,height:40,borderRadius:10,background:fn?C.green:C.blue,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20}}>{fn?"✓":"⏳"}</div>

              <div style={{fontWeight:700,fontSize:16}}>{fn?t("fillNow",lang):`${t("wait",lang)} — ${md?.label} ${t("cheaper",lang)}`}</div>
              <div style={{color:C.muted,fontSize:12}}>{fn?`~${fmt(tb)} €/L`:`~${fmt(mw)} €/L (${((tb-mw)*100).toFixed(1)} ct${savingsOnFull>0?` · ~${savingsOnFull}€ ${lang==="de"?"gespart":"saved"}`:""})` }</div>
            </div>
          </div>
          {!fn&&currentFuel>0&&(
            <div style={{fontSize:11,color:canWait?C.green:C.amber,marginTop:8}}>
              {canWait
                ?(lang==="de"?`🔋 Reichweite ~${rangeKm}km — reicht bis ${md?.label}.`:`🔋 Range ~${rangeKm}km — enough until ${md?.label}.`)
                :(lang==="de"?`⚠ Reichweite ~${rangeKm}km — evtl. vorher 10-15L nachtanken.`:`⚠ Range ~${rangeKm}km — consider topping up 10-15L first.`)}
            </div>

      {options.map(o=>(

    </div>
  );

  // ─── SMART FILL-UP FLOW ─────────────────────────────────────
  const [quickFuel,setQuickFuel]=useState(fuel);
  const [quickLiters,setQuickLiters]=useState("");
  const [quickStation,setQuickStation]=useState(null);
  const [geoLocating,setGeoLocating]=useState(false);

  const geoLocateStation=()=>{
    if(!navigator.geolocation)return;
    setGeoLocating(true);
    navigator.geolocation.getCurrentPosition(pos=>{
      const lat=pos.coords.latitude,lng=pos.coords.longitude;
      // Find closest open station from current data
      let closest=null,minDist=Infinity;
      for(const st of active){
        if(!st.lat||!st.lng||!st.isOpen)continue;
        const d=Math.sqrt(Math.pow(st.lat-lat,2)+Math.pow(st.lng-lng,2));
        if(d<minDist){minDist=d;closest=st}
      }
      if(closest){setQuickStation(closest);const p=closest[quickFuel]||closest.price;if(p&&typeof p==="number")setLogPrice(String(p))}
      setGeoLocating(false);
    },()=>setGeoLocating(false));
  };

  const quickLogFillup=()=>{
    const l=parseFloat(quickLiters);
    const p=quickStation?parseFloat(quickStation[quickFuel]||quickStation.price):parseFloat(logPrice);
    if(!l||!p)return;
    const entry={id:Date.now(),ts:Date.now(),liters:l,pricePerL:p,total:+(l*p).toFixed(2),station:quickStation?.brand||quickStation?.name||"—",fuel:quickFuel};
    const updated=[entry,...fillups].slice(0,200);
    setFillups(updated);S.set("fillups",JSON.stringify(updated));
    setQuickLiters("");setQuickStation(null);setShowLogForm(false);
    const newLevel=Math.min(100,currentFuel+(l/tankSize)*100);
    saveCurrentFuel(newLevel);
  };

        {tab==="forecast"&&(
          <div>
            <SubToggle options={[{id:"forecast",label:lang==="de"?"Prognose":"Forecast"},{id:"patterns",label:lang==="de"?"Muster":"Patterns"},{id:"history",label:lang==="de"?"Verlauf":"History"}]} value={subView} onChange={setSubView}/>
            {subView==="forecast"?renderForecast():subView==="patterns"?renderPatterns():renderHistory()}
          </div>
        )}
        {tab==="tracker"&&(
          <div style={{display:"flex",flexDirection:"column",gap:12}}>
            <Hint id="tracker_gps" emoji="📍">{lang==="de"?"Tippe 'Ich habe getankt' — die Station wird automatisch per GPS erkannt.":"Tap 'I filled up' — the station is auto-detected via GPS."}</Hint>
            {/* Quick fill-up button */}
            {!showLogForm?(
              <div style={{...s.card,textAlign:"center",padding:20}} onClick={()=>{setShowLogForm(true);geoLocateStation()}}>
                <div style={{fontSize:32,marginBottom:8}}>⛽</div>
                <div style={{fontWeight:700,fontSize:16}}>{lang==="de"?"Ich habe getankt":"I filled up"}</div>
                <div style={{color:C.muted,fontSize:12,marginTop:4}}>{lang==="de"?"Tippen um Tankvorgang zu erfassen":"Tap to log fill-up"}</div>
              </div>
            ):(
              <div style={s.card} className="fade-up">
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
                  <div style={{fontWeight:700,fontSize:14}}>{lang==="de"?"Tankvorgang":"Fill-up"}</div>
                  <div style={{cursor:"pointer",color:C.muted,fontSize:18}} onClick={()=>{setShowLogForm(false);setQuickStation(null)}}>✕</div>
                </div>
                {/* Station auto-detect */}
                {geoLocating&&<div className="pulsing" style={{color:C.muted,fontSize:12,marginBottom:8}}>📍 {lang==="de"?"Tankstelle wird erkannt...":"Detecting station..."}</div>}
                {quickStation&&(
                  <div style={{display:"flex",alignItems:"center",gap:8,padding:10,borderRadius:8,background:C.greenGlow,border:`1px solid ${C.green}`,marginBottom:12}}>
                    {(()=>{const bb=brandBadge(quickStation.brand,24);return bb?<div style={bb}>{BRANDS[quickStation.brand]?.short}</div>:null})()}
                    <div style={{flex:1}}>
                      <div style={{fontWeight:600,fontSize:13}}>{quickStation.brand} {quickStation.name}</div>
                      <div style={{color:C.muted,fontSize:11}}>{quickStation.place} · {fmt(quickStation[quickFuel]||quickStation.price)} €/L</div>
                    </div>
                    <span style={{color:C.green,fontSize:14}}>✓</span>
                  </div>
                )}
                {!quickStation&&!geoLocating&&(
                  <button onClick={geoLocateStation} style={{...s.btnM,width:"100%",marginBottom:12}}>📍 {lang==="de"?"Tankstelle erkennen":"Detect station"}</button>
                )}
                {/* Fuel type */}
                <div style={{marginBottom:12}}>
                  <div style={{fontSize:11,color:C.muted,marginBottom:4}}>{lang==="de"?"Kraftstoff":"Fuel"}</div>
                  <div style={{display:"flex",gap:4}}>
                    {["e10","e5","diesel"].map(f=><div key={f} style={s.pill(quickFuel===f)} onClick={()=>setQuickFuel(f)}>{f==="diesel"?"Diesel":f.toUpperCase()}</div>)}
                  </div>
                </div>
                {/* Liters only */}
                <div style={{marginBottom:12}}>
                  <div style={{fontSize:11,color:C.muted,marginBottom:4}}>{lang==="de"?"Liter":"Liters"}</div>
                  <input type="number" step="0.1" value={quickLiters} onChange={e=>setQuickLiters(e.target.value)} placeholder="45.0" style={{...s.input,fontFamily:"monospace",fontSize:20,fontWeight:700,textAlign:"center",padding:12}} autoFocus/>
                </div>
                <button onClick={quickLogFillup} disabled={!quickLiters} style={{...s.btn,width:"100%",padding:12,fontSize:14,opacity:quickLiters?1:.5}}>💾 {lang==="de"?"Speichern":"Save"}</button>
              </div>
            )}
            {/* Monthly summary */}
            <div style={s.grid}>
              <div style={s.card}>
                <div style={s.cardT}>{t("thisMonth",lang)}</div>
                <div style={{...s.big,fontSize:24,color:C.amber}}>{fillupStats.thisMonth.toFixed(2)} €</div>
                <div style={{color:C.muted,fontSize:11}}>{fillupStats.litersThis} L · {fillupStats.count}x</div>
              </div>
              <div style={s.card}>
                <div style={s.cardT}>{t("savedVsAvg",lang)}</div>
                <div style={{...s.big,fontSize:24,color:fillupStats.savedVsAvg>=0?C.green:C.red}}>{fillupStats.savedVsAvg>=0?"+":""}{fillupStats.savedVsAvg.toFixed(2)} €</div>
              </div>
            </div>
            {/* Fill-up list */}
            {fillups.length>0&&(
              <div style={s.card}>
                <div style={s.cardT}>{t("tracker",lang)}</div>
                {fillups.slice(0,15).map((f,i)=>(
                  <div key={f.id} style={{...s.row,gap:8}}>
                    <div style={{flex:1}}>
                      <div style={{fontWeight:600,fontSize:12}}>{f.station} · {f.fuel?.toUpperCase()}</div>
                      <div style={{color:C.muted,fontSize:11}}>{new Date(f.ts).toLocaleDateString("de-DE",{day:"2-digit",month:"2-digit"})} · {f.liters}L × {fmt(f.pricePerL)}</div>
                    </div>
                    <div style={{fontFamily:"monospace",fontSize:14,fontWeight:700}}>{f.total.toFixed(2)} €</div>
                    <div style={{cursor:"pointer",color:C.dim,fontSize:12}} onClick={()=>deleteFillup(f.id)}>✕</div>
                  </div>
                ))}
              </div>
            )}
            {/* Tank level */}
            <div style={s.card}>
              <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:C.muted,marginBottom:4}}>
                <span>{t("fuelLevel",lang)}</span><span style={{fontFamily:"monospace",fontWeight:700}}>{Math.round(currentFuel)}% · ~{tankAdvisor.rangeKm} km</span>
              </div>
              <input type="range" min="0" max="100" step="5" value={currentFuel} onChange={e=>saveCurrentFuel(+e.target.value)} className="slide-range"/>
            </div>
          </div>
        )}
        {tab==="settings"&&renderSettings()}
      </div>
      {/* BOTTOM NAV */}
      <div className="bottom-nav">
        {TABS.map(tb=>(
          <div key={tb.id} className="nav-item" onClick={()=>{setTab(tb.id);if(tb.id==="prices")setSubView("list");if(tb.id==="forecast")setSubView("forecast")}} style={{color:tab===tb.id?C.green:C.muted}}>
            <span className="nav-icon">{tb.icon}</span>
            <span className="nav-label">{tb.label[lang]||tb.label.de}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(TankRadar));
</script>
</body>
</html>
