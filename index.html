const toDate=s=>new Date(s+"T00:00:00");
const daysB=(a,b)=>Math.round((b-a)/864e5);
const API="https://creativecommons.tankerkoenig.de/json";

function vacProx(date){let m=Infinity,c=null;const d=typeof date==="string"?toDate(date):date;for(const v of VACATIONS){const s=toDate(v.s),diff=daysB(d,s);if(diff>=-2&&diff<=7&&Math.abs(diff)<Math.abs(m)){m=diff;c=v}}return{days:m,vac:c}}
function holProx(date){const d=typeof date==="string"?toDate(date):date;for(const h of HOLIDAYS){const diff=daysB(d,toDate(h.d));if(diff>=-2&&diff<=2)return{days:diff,hol:h}}return null}
function fcDelta(date,hour=12){const d=typeof date==="string"?toDate(date):new Date(date);const dow=(d.getDay()+6)%7;let delta=HOURLY_DELTA[hour]+DAILY_DELTA[dow];const v=vacProx(d);if(v.vac&&v.days>=-2&&v.days<=3)delta+=4;const h=holProx(d);if(h&&h.days>=-1&&h.days<=0)delta+=5;return delta}
function bestTimeNow(){const h=new Date().getHours();if(h<18)return{label:"19:00–20:00",wait:true};if(h<=20)return{label:"Jetzt!",wait:false};return{label:"morgen 19:00",wait:true}}

  const [alertPrice,setAlertPrice]=useState(()=>parseFloat(S.get("alert"))||0);
  const [alertOn,setAlertOn]=useState(()=>S.get("alert_on")==="1");
  const [detailStation,setDetailStation]=useState(null);
  const [detailData,setDetailData]=useState(null);
  const [deferredPrompt,setDeferredPrompt]=useState(null);
  const mapRef=useRef(null);
  const mapInst=useRef(null);
  const markersRef=useRef([]);

  const C=THEMES[theme];
  const dn=DAY_NAMES[lang]||DAY_NAMES.de;
  const df=DAY_FULL[lang]||DAY_FULL.de;
  const isFile=window.location.protocol==="file:";

  // ─── EFFECTS ────────────────────────────────────────────────
  useEffect(()=>{document.body.className=theme},[theme]);
  useEffect(()=>{
    const h=e=>{e.preventDefault();setDeferredPrompt(e)};
    window.addEventListener("beforeinstallprompt",h);
    return()=>window.removeEventListener("beforeinstallprompt",h);
  },[]);

  const saveTheme=v=>{setTheme(v);S.set("theme",v)};
  const saveLang=v=>{setLang(v);S.set("lang",v)};
  const saveRad=v=>{setRad(v);S.set("rad",String(v))};
  const saveFuel=v=>{setFuel(v);S.set("fuel",v)};
  const saveLoc=v=>{setLoc(v);S.set("loc",JSON.stringify(v))};
  const saveBrent=v=>{setBrent(v);S.set("brent",String(v))};
  const saveAlert=v=>{setAlertPrice(v);S.set("alert",String(v))};
  const toggleAlert=()=>{const n=!alertOn;setAlertOn(n);S.set("alert_on",n?"1":"0");if(n&&"Notification" in window)Notification.requestPermission()};

  const saveKey=()=>{if(!keyInput.trim())return;S.set("api_key",keyInput.trim());setApiKey(keyInput.trim());setDemo(false)};
  const clearKey=()=>{S.del("api_key");setApiKey("");setKeyInput("");setDemo(true);setStations([])};

  // ─── FETCH STATIONS ─────────────────────────────────────────
  const fetchStations=useCallback(async()=>{
    if(!apiKey)return;
    if(isFile){setError("CORS: file:// blocked. Use http://localhost or deploy.");return}
    setLoading(true);setError(null);
    try{
      const fuelParam=fuel==="all"?"all":fuel;
      const url=`${API}/list.php?lat=${loc.lat}&lng=${loc.lng}&rad=${rad}&sort=price&type=${fuelParam}&apikey=${apiKey}`;
      const res=await fetch(url);const data=await res.json();
      if(!data.ok)throw new Error(data.message||"API error");
      setStations(data.stations||[]);setLastFetch(new Date());
      // Save history snapshot
      try{
        const valid=(data.stations||[]).filter(s=>typeof s.price==="number"&&s.price>0);
        if(valid.length){
          const avgP=valid.reduce((a,b)=>a+b.price,0)/valid.length;
          const snap={ts:Date.now(),avg:+avgP.toFixed(3),min:valid[0].price,count:valid.length};
          let hist=S.json(`hist_${fuel}`,[]);
          hist.push(snap);if(hist.length>1000)hist=hist.slice(-1000);
          S.set(`hist_${fuel}`,JSON.stringify(hist));
        }
      }catch{}
      // Price alert check
      if(alertOn&&alertPrice>0){
        const valid=(data.stations||[]).filter(s=>typeof s.price==="number"&&s.price>0&&s.isOpen);
        const cheap=valid[0];
        if(cheap&&cheap.price<=alertPrice&&"Notification" in window&&Notification.permission==="granted"){
          new Notification("⛽ TankRadar Preisalarm!",{body:`${cheap.brand||cheap.name}: ${fmt(cheap.price)} €/L (${fuel.toUpperCase()})`,icon:"⛽"});
        }
      }
    }catch(e){
      setError(e.message==="Failed to fetch"?"Verbindung fehlgeschlagen. Prüfe API-Key und Netzwerk.":e.message);
    }
    setLoading(false);
  },[apiKey,fuel,loc,rad,alertOn,alertPrice]);

  useEffect(()=>{if(apiKey)fetchStations()},[apiKey,fuel,loc,rad,fetchStations]);
  useEffect(()=>{if(!apiKey)return;const iv=setInterval(fetchStations,5*60000);return()=>clearInterval(iv)},[apiKey,fetchStations]);

  // ─── FETCH OIL PRICE ────────────────────────────────────────
  useEffect(()=>{
    (async()=>{
      try{
        const res=await fetch("https://api.frankfurter.app/latest?from=USD&to=EUR");
        const data=await res.json();
        if(data.rates?.EUR){S.set("usd_eur",String(data.rates.EUR))}
      }catch{}
    })();
  },[]);

  // ─── GEOCODING ──────────────────────────────────────────────
  const searchLocation=async(q)=>{
    if(q.length<2)return;
    try{
      const res=await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(q)}&countrycodes=de&limit=5`);
      const data=await res.json();
      setLocResults(data.map(r=>({lat:+r.lat,lng:+r.lon,name:r.display_name.split(",").slice(0,2).join(",")})));
    }catch{}
  };
  const useGPS=()=>{
    if(!navigator.geolocation)return;
    navigator.geolocation.getCurrentPosition(p=>{
      const nl={lat:p.coords.latitude,lng:p.coords.longitude,name:"📍 GPS"};
      saveLoc(nl);setLocSearch("");setLocResults([]);
    });
  };

  // ─── STATION DETAIL ─────────────────────────────────────────
  const loadDetail=async(id)=>{
    setDetailStation(id);setDetailData(null);
    if(!apiKey||demo)return;
    try{
      const res=await fetch(`${API}/detail.php?id=${id}&apikey=${apiKey}`);
      const data=await res.json();
      if(data.ok)setDetailData(data.station);
    }catch{}
  };

  // ─── DERIVED ────────────────────────────────────────────────
  const active=demo?DEMO_STATIONS:stations;
  const validStations=active.filter(s=>s.isOpen&&typeof s.price==="number"&&s.price>0).sort((a,b)=>a.price-b.price);
  const allSorted=[...active].sort((a,b)=>{const ap=typeof a.price==="number"&&a.price>0?a.price:Infinity;const bp=typeof b.price==="number"&&b.price>0?b.price:Infinity;return ap-bp});
  const currentAvg=validStations.length?validStations.reduce((a,b)=>a+b.price,0)/validStations.length:0;
  const cheapest=validStations[0];
  const spread=validStations.length>1?validStations[validStations.length-1].price-validStations[0].price:0;
  const bestT=bestTimeNow();

  const forecastData=useMemo(()=>{
    const base=currentAvg||1.629;
    return Array.from({length:14},(_,i)=>{
      const d=new Date();d.setDate(d.getDate()+i);
      const dow=(d.getDay()+6)%7;
      const best=+(base+fcDelta(d,19)/100).toFixed(3);
      const worst=+(base+fcDelta(d,7)/100).toFixed(3);
      const v=vacProx(d),h=holProx(d);
      return{date:d.toISOString().slice(0,10),label:`${dn[dow]} ${d.getDate()}.${d.getMonth()+1}`,best,worst,avg:+((best+worst)/2).toFixed(3),isVac:v.vac&&v.days>=0&&v.days<=3,vacName:v.vac?.name,vacState:v.vac?.state,isHol:!!h,holName:h?.hol?.name};
    });
  },[currentAvg,lang]);

  const hourlyData=HOURLY_DELTA.map((d,i)=>({hour:`${String(i).padStart(2,"0")}:00`,delta:d,fill:d<=-3?C.green:d>=4?C.red:C.amber}));
  const dailyData=DAILY_DELTA.map((d,i)=>({day:dn[i],dayFull:df[i],delta:d,fill:d<=-0.5?C.green:d>=0.5?C.red:C.amber}));

  const oilImpact=useMemo(()=>{
    const raw=(brent/159)*1.15;
    const est=(raw+0.6545+0.0865+0.10)*1.19;
    return{raw,est:+est.toFixed(3)};
  },[brent]);

  const upcomingEvents=useMemo(()=>{
    const now=new Date();const ev=[];
    for(const v of VACATIONS){const diff=daysB(now,toDate(v.s));if(diff>=-3&&diff<=30)ev.push({type:"vac",name:`${v.name} (${v.state})`,days:diff})}
    for(const h of HOLIDAYS){const diff=daysB(now,toDate(h.d));if(diff>=-1&&diff<=30)ev.push({type:"hol",name:h.name,days:diff})}
    ev.sort((a,b)=>a.days-b.days);return ev.slice(0,8);
  },[]);

  const historyData=useMemo(()=>{
    const hist=S.json(`hist_${fuel}`,[]);
    return hist.slice(-100).map(h=>({time:new Date(h.ts).toLocaleDateString("de-DE",{day:"2-digit",month:"2-digit"}),avg:h.avg,min:h.min}));
  },[fuel,lastFetch]);

  // ─── SHARE ──────────────────────────────────────────────────
  const sharePrice=()=>{
    if(!cheapest)return;
    const text=`⛽ ${t("shareText",lang)}: ${fmt(cheapest.price)} €/L ${fuel.toUpperCase()} — ${cheapest.brand||cheapest.name}, ${cheapest.place}`;
    if(navigator.share){navigator.share({text}).catch(()=>{})}
    else window.open(`https://wa.me/?text=${encodeURIComponent(text)}`,"_blank");
  };

  // ─── MAP EFFECT ─────────────────────────────────────────────
  useEffect(()=>{
    if(tab!=="map"||!mapRef.current||!L)return;
    if(!mapInst.current){
      mapInst.current=L.map(mapRef.current,{zoomControl:true}).setView([loc.lat,loc.lng],11);
      L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{attribution:'© OSM',maxZoom:18}).addTo(mapInst.current);
    }else{
      mapInst.current.setView([loc.lat,loc.lng],rad<=5?14:rad<=10?13:rad<=15?12:11);
    }
    markersRef.current.forEach(m=>m.remove());markersRef.current=[];
    // Center marker
    const cm=L.circleMarker([loc.lat,loc.lng],{radius:8,color:C.blue,fillColor:C.blue,fillOpacity:0.5,weight:2}).addTo(mapInst.current);
    cm.bindTooltip(loc.name,{permanent:false});markersRef.current.push(cm);
    // Radius circle
    const rc=L.circle([loc.lat,loc.lng],{radius:rad*1000,color:C.amber,fillColor:C.amber,fillOpacity:0.03,weight:1,dashArray:"5,5"}).addTo(mapInst.current);
    markersRef.current.push(rc);
    // Station markers
    const stList=demo?DEMO_STATIONS:stations;
    stList.forEach(st=>{
      if(!st.lat||!st.lng)return;
      const hasP=typeof st.price==="number"&&st.price>0;
      const priceText=hasP?fmt(st.price):"—";
      const color=!st.isOpen?"#666":!hasP?"#666":st===cheapest?C.green:C.text;
      const bg=!st.isOpen?"#333":!hasP?"#333":st===cheapest?"#065f46":C.card;
      const icon=L.divIcon({className:"price-marker",html:`<div class="price-label" style="background:${bg};color:${color};border:1px solid ${C.border}">${priceText}</div>`,iconSize:[54,22],iconAnchor:[27,11]});
      const m=L.marker([st.lat,st.lng],{icon}).addTo(mapInst.current);
      m.bindPopup(`<div style="font-family:DM Sans,sans-serif;font-size:13px"><strong>${st.brand||""} ${st.name}</strong><br/>${st.street} ${st.houseNumber||""}, ${st.place}<br/><span style="font-family:JetBrains Mono,monospace;font-size:16px;font-weight:700;color:${color}">${priceText} €</span><br/><span style="font-size:11px;color:${C.muted}">${st.dist?.toFixed(1)} km · ${st.isOpen?t("open",lang):t("closed",lang)}</span></div>`,{className:"station-popup"});
      markersRef.current.push(m);
    });
    setTimeout(()=>mapInst.current?.invalidateSize(),100);
  },[tab,stations,demo,loc,rad,theme,cheapest]);

  // Cleanup map on unmount from tab
  useEffect(()=>{
    if(tab!=="map"&&mapInst.current){mapInst.current.remove();mapInst.current=null;markersRef.current=[]}
  },[tab]);

  // ─── STYLES ─────────────────────────────────────────────────
  const s={
    header:{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"12px 16px",borderBottom:`1px solid ${C.border}`,flexWrap:"wrap",gap:8,background:C.card},
    logo:{display:"flex",alignItems:"center",gap:8},
    logoIcon:{width:28,height:28,borderRadius:7,background:`linear-gradient(135deg,${C.amber},${C.amberDk})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:15},
    pills:{display:"flex",gap:4,alignItems:"center",flexWrap:"wrap"},
    pill:a=>({padding:"5px 12px",borderRadius:16,fontSize:11,fontWeight:600,cursor:"pointer",background:a?C.amber:"transparent",color:a?"#000":C.muted,border:a?"none":`1px solid ${C.border}`,transition:"all .2s"}),
    tabs:{display:"flex",gap:0,padding:"0 12px",borderBottom:`1px solid ${C.border}`,overflowX:"auto",background:C.card},
    tab:a=>({padding:"10px 14px",fontSize:12,fontWeight:a?600:400,cursor:"pointer",color:a?C.amber:C.muted,borderBottom:a?`2px solid ${C.amber}`:"2px solid transparent",whiteSpace:"nowrap"}),
    content:{padding:16,maxWidth:1200,margin:"0 auto"},
    grid:{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(260px,1fr))",gap:12},
    card:{background:C.card,borderRadius:10,border:`1px solid ${C.border}`,padding:16},
    cardT:{fontSize:10,fontWeight:600,textTransform:"uppercase",letterSpacing:".08em",color:C.muted,marginBottom:10},
    big:{fontSize:36,fontWeight:800,fontFamily:"'JetBrains Mono',monospace",letterSpacing:"-.03em"},
    row:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:`1px solid ${C.border}`},
    badge:bg=>({display:"inline-block",padding:"2px 7px",borderRadius:5,fontSize:10,fontWeight:600,background:bg,color:"#000"}),
    input:{background:C.bg,border:`1px solid ${C.border}`,borderRadius:7,padding:"7px 10px",color:C.text,fontSize:13,outline:"none",width:"100%"},
    btn:{background:C.amber,color:"#000",border:"none",borderRadius:7,padding:"7px 14px",fontSize:12,fontWeight:600,cursor:"pointer"},
    btnM:{background:"transparent",color:C.muted,border:`1px solid ${C.border}`,borderRadius:7,padding:"7px 14px",fontSize:12,cursor:"pointer"},
  };

  const TABS=[
    {id:"dashboard",icon:"📊"},{id:"stations",icon:"⛽"},{id:"map",icon:"🗺"},
    {id:"patterns",icon:"📈"},{id:"forecast",icon:"🔮"},{id:"history",icon:"📉"},{id:"settings",icon:"⚙"},
  ];

  const daysLabel=d=>d<=0?t("now",lang):d===1?t("tomorrow",lang):t("inDays",lang,{n:d});

  // ─── DETAIL MODAL ───────────────────────────────────────────
  const DetailModal=()=>{
    if(!detailStation)return null;
    const st=active.find(s=>s.id===detailStation);
    if(!st)return null;
    const dd=detailData;
    return(
      <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.6)",zIndex:9999,display:"flex",alignItems:"center",justifyContent:"center",padding:16}} onClick={()=>setDetailStation(null)}>
        <div style={{...s.card,maxWidth:420,width:"100%",maxHeight:"80vh",overflow:"auto"}} onClick={e=>e.stopPropagation()}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
            <div style={{fontWeight:700,fontSize:16}}>{st.brand} {st.name}</div>
            <div style={{cursor:"pointer",fontSize:20,color:C.muted}} onClick={()=>setDetailStation(null)}>✕</div>
          </div>
          <div style={{color:C.muted,fontSize:13,marginBottom:12}}>{st.street} {st.houseNumber||""}, {st.postCode||""} {st.place}</div>
          <div style={{fontSize:12,fontWeight:600,color:C.muted,textTransform:"uppercase",marginBottom:6}}>{t("allFuels",lang)}</div>
          <div style={{display:"flex",gap:12,marginBottom:16}}>
            {[["E5",dd?.e5||st.e5],["E10",dd?.e10||st.e10],["Diesel",dd?.diesel||st.diesel]].map(([n,p])=>(
              <div key={n} style={{...s.card,flex:1,textAlign:"center",padding:10}}>
                <div style={{fontSize:11,color:C.muted,marginBottom:4}}>{n}</div>
                <div style={{fontFamily:"JetBrains Mono,monospace",fontSize:16,fontWeight:700,color:typeof p==="number"?C.text:C.dim}}>{typeof p==="number"?fmt(p):"—"}</div>
              </div>
            ))}
          </div>
          {dd?.openingTimes&&dd.openingTimes.length>0&&(
            <div>
              <div style={{fontSize:12,fontWeight:600,color:C.muted,textTransform:"uppercase",marginBottom:6}}>{t("openingHours",lang)}</div>
              {dd.openingTimes.map((ot,i)=>(
                <div key={i} style={{display:"flex",justifyContent:"space-between",padding:"4px 0",fontSize:13,borderBottom:i<dd.openingTimes.length-1?`1px solid ${C.border}`:""}}> 
                  <span>{ot.text}</span><span style={{fontFamily:"monospace",color:C.muted}}>{ot.start?.slice(0,5)}–{ot.end?.slice(0,5)}</span>
                </div>
              ))}
            </div>
          )}
          {!dd&&!demo&&<div className="pulsing" style={{color:C.muted,fontSize:12,textAlign:"center",padding:20}}>{t("loading",lang)}</div>}
          <div style={{display:"flex",gap:8,marginTop:16}}>
            <button style={s.btn} onClick={()=>window.open(`https://www.google.com/maps/dir/?api=1&destination=${st.lat},${st.lng}`,"_blank")}>🧭 Navigation</button>
            <button style={s.btnM} onClick={()=>setDetailStation(null)}>{t("closed",lang)==="closed"?"Close":"Schließen"}</button>
          </div>
        </div>
      </div>
    );
  };

  // ─── DASHBOARD ──────────────────────────────────────────────
  const renderDashboard=()=>(
    <div style={{display:"flex",flexDirection:"column",gap:12}}>
      {demo&&<div style={{...s.card,background:C.amberGlow,borderColor:C.amber}}><strong>⚠ {t("demo",lang)}</strong><div style={{color:C.muted,fontSize:12,marginTop:4}}>{t("demoDesc",lang)}</div></div>}
      {error&&<div style={{...s.card,background:"rgba(244,63,94,.06)",borderColor:C.red,color:C.red,fontSize:13}}>{error}</div>}
      <div style={s.grid}>
        <div style={s.card}>
          <div style={s.cardT}>{t("cheapest",lang)} · {fuel.toUpperCase()}</div>
          <div style={{...s.big,color:C.green}}>{fmt(cheapest?.price)} €</div>
          <div style={{color:C.muted,fontSize:11,marginTop:4}}>{cheapest?.brand||cheapest?.name} · {cheapest?.dist?.toFixed(1)} km</div>
          {cheapest&&<div style={{display:"flex",gap:6,marginTop:8}}>
            <button style={{...s.btn,fontSize:11,padding:"4px 10px"}} onClick={sharePrice}>📤 {t("share",lang)}</button>
            <button style={{...s.btnM,fontSize:11,padding:"4px 10px"}} onClick={()=>loadDetail(cheapest.id)}>ℹ {t("details",lang)}</button>
          </div>}
        </div>
        <div style={s.card}>
          <div style={s.cardT}>{t("average",lang)} · {rad} km</div>
          <div style={{...s.big,color:C.amber}}>{fmt(currentAvg)} €</div>
          <div style={{color:C.muted,fontSize:11,marginTop:4}}>Spread: {(spread*100).toFixed(1)} ct · {validStations.length} {t("open",lang)}</div>
        </div>
        <div style={s.card}>
          <div style={s.cardT}>{t("bestTime",lang)}</div>
          <div style={{...s.big,fontSize:26,color:bestT.wait?C.blue:C.green}}>{bestT.label}</div>
          <div style={{color:C.muted,fontSize:11,marginTop:4}}>{bestT.wait?t("eveningSaves",lang):t("goodTime",lang)}</div>
        </div>
      </div>
      {upcomingEvents.length>0&&(
        <div style={s.card}>
          <div style={s.cardT}>{t("priceTriggers",lang)}</div>
          {upcomingEvents.slice(0,5).map((ev,i)=>(
            <div key={i} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"5px 0",borderBottom:i<4?`1px solid ${C.border}`:""}}>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <span style={s.badge(ev.type==="hol"?C.red:C.amber)}>{ev.type==="hol"?t("holiday",lang):t("vacation",lang)}</span>
                <span style={{fontSize:12}}>{ev.name}</span>
              </div>
              <span style={{color:C.muted,fontSize:11,fontFamily:"monospace"}}>{daysLabel(ev.days)}</span>
            </div>
          ))}
        </div>
      )}
      <div style={s.card}>
        <div style={s.cardT}>{t("top5",lang)}</div>
        {validStations.slice(0,5).map((st,i)=>(
          <div key={st.id} style={{...s.row,cursor:"pointer"}} onClick={()=>loadDetail(st.id)}>
            <div>
              <div style={{fontWeight:600,fontSize:12}}><span style={{color:C.muted,fontFamily:"monospace",marginRight:6}}>#{i+1}</span>{st.brand||st.name}</div>
              <div style={{color:C.muted,fontSize:11}}>{st.place} · {st.dist?.toFixed(1)} km</div>
            </div>
            <div style={{fontFamily:"JetBrains Mono,monospace",fontSize:17,fontWeight:700,color:i===0?C.green:C.text}}>{fmt(st.price)}</div>
          </div>
        ))}
      </div>
    </div>
  );

  // ─── STATIONS ───────────────────────────────────────────────
  const renderStations=()=>(
    <div style={s.card}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
        <div style={s.cardT}>{t("allStations",lang)} · {fuel.toUpperCase()} · {rad} km</div>
        {!demo&&<button onClick={fetchStations} style={s.btnM}>{loading?t("loading",lang):t("refresh",lang)}</button>}
      </div>
      {allSorted.map((st,i)=>{const hp=typeof st.price==="number"&&st.price>0;return(
        <div key={st.id} style={{...s.row,opacity:st.isOpen?(hp?1:.6):.4,cursor:"pointer"}} onClick={()=>loadDetail(st.id)}>
          <div style={{flex:1}}>
            <div style={{fontWeight:600,fontSize:12,display:"flex",alignItems:"center",gap:6}}>
              {st.brand&&<span style={s.badge(C.border)}>{st.brand}</span>}{st.name}
              {!st.isOpen&&<span style={{...s.badge(C.redDk),color:C.red}}>{t("closed",lang)}</span>}
              {st.isOpen&&!hp&&<span style={{...s.badge(C.border),color:C.muted}}>{t("noFuel",lang)} {fuel.toUpperCase()}</span>}
            </div>
            <div style={{color:C.muted,fontSize:11,marginTop:2}}>{st.street}, {st.place} · {st.dist?.toFixed(1)} km</div>
          </div>
          <div style={{fontFamily:"JetBrains Mono,monospace",fontSize:18,fontWeight:700,color:!hp?C.dim:i===0?C.green:C.text}}>{hp?fmt(st.price):"—"}</div>
        </div>
      )})}
    </div>
  );

  // ─── MAP ────────────────────────────────────────────────────
  const renderMap=()=>(
    <div style={{display:"flex",flexDirection:"column",gap:12}}>
      <div ref={mapRef} style={{height:480,borderRadius:12,border:`1px solid ${C.border}`}}/>
      <div style={{color:C.muted,fontSize:11,textAlign:"center"}}>{validStations.length} {t("stations",lang)} · {loc.name} · {rad} km</div>
    </div>
  );

  // ─── PATTERNS ───────────────────────────────────────────────
  const renderPatterns=()=>(
    <div style={{display:"flex",flexDirection:"column",gap:12}}>
      <div style={s.card}>
        <div style={s.cardT}>{t("dailyPattern",lang)}</div>
        <ResponsiveContainer width="100%" height={220}>
          <BarChart data={hourlyData} margin={{top:5,right:5,bottom:5,left:-15}}>
            <CartesianGrid strokeDasharray="3 3" stroke={C.border}/><XAxis dataKey="hour" tick={{fill:C.muted,fontSize:9}} interval={2}/>
            <YAxis tick={{fill:C.muted,fontSize:9}} tickFormatter={v=>`${v>0?"+":""}${v}`}/>
            <Tooltip contentStyle={{background:C.card,border:`1px solid ${C.border}`,borderRadius:8,fontSize:11}} formatter={v=>[`${v>0?"+":""}${v} ct/L`]}/>
            <Bar dataKey="delta" radius={[3,3,0,0]}>{hourlyData.map((e,i)=><Cell key={i} fill={e.fill} fillOpacity={.8}/>)}</Bar>
          </BarChart>
        </ResponsiveContainer>
      </div>
      <div style={s.grid}>
        <div style={s.card}>
          <div style={s.cardT}>{t("weeklyPattern",lang)}</div>
          <ResponsiveContainer width="100%" height={180}>
            <BarChart data={dailyData} margin={{top:5,right:5,bottom:5,left:-15}}>
              <CartesianGrid strokeDasharray="3 3" stroke={C.border}/><XAxis dataKey="day" tick={{fill:C.muted,fontSize:10}}/>
              <YAxis tick={{fill:C.muted,fontSize:9}} domain={[-2,2]}/><Tooltip contentStyle={{background:C.card,border:`1px solid ${C.border}`,borderRadius:8,fontSize:11}}/>
              <Bar dataKey="delta" radius={[3,3,0,0]}>{dailyData.map((e,i)=><Cell key={i} fill={e.fill} fillOpacity={.8}/>)}</Bar>
            </BarChart>
          </ResponsiveContainer>
        </div>
        <div style={s.card}>
          <div style={s.cardT}>{t("summary",lang)}</div>
          {[{i:"🟢",k:"cheapestTime",d:"cheapestTimeDesc"},{i:"🔴",k:"expensiveTime",d:"expensiveTimeDesc"},{i:"💡",k:"saveTip",d:"saveTipDesc"},{i:"⚠️",k:"vacSurcharge",d:"vacSurchargeDesc"}].map(x=>(
            <div key={x.k} style={{display:"flex",gap:8,marginBottom:10}}>
              <span>{x.i}</span><div><div style={{fontWeight:600,fontSize:12}}>{t(x.k,lang)}</div><div style={{color:C.muted,fontSize:11}}>{t(x.d,lang)}</div></div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );

  // ─── FORECAST ───────────────────────────────────────────────
  const renderForecast=()=>{
    const tb=forecastData[0]?.best;
    const mw=Math.min(...forecastData.slice(0,7).map(d=>d.best));
    const md=forecastData.slice(0,7).find(d=>d.best===mw);
    const fn=tb<=mw+.005;
    return(
      <div style={{display:"flex",flexDirection:"column",gap:12}}>
        <div style={{...s.card,borderColor:fn?C.green:C.blue,background:fn?"rgba(16,185,129,.04)":"rgba(59,130,246,.04)"}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <div style={{width:40,height:40,borderRadius:10,background:fn?C.green:C.blue,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20}}>{fn?"✓":"⏳"}</div>
            <div><div style={{fontWeight:700,fontSize:16}}>{fn?t("fillNow",lang):`${t("wait",lang)} — ${md?.label} ${t("cheaper",lang)}`}</div>
              <div style={{color:C.muted,fontSize:12}}>{fn?`~${fmt(tb)} €/L`:`~${fmt(mw)} €/L (${((tb-mw)*100).toFixed(1)} ct)`}</div>
            </div>
          </div>
        </div>
        <div style={s.card}>
          <div style={s.cardT}>{t("forecast14",lang)} — {fuel.toUpperCase()}</div>
          <ResponsiveContainer width="100%" height={250}>
            <AreaChart data={forecastData} margin={{top:10,right:5,bottom:5,left:-15}}>
              <defs><linearGradient id="ga" x1="0" y1="0" x2="0" y2="1"><stop offset="5%" stopColor={C.amber} stopOpacity={.12}/><stop offset="95%" stopColor={C.amber} stopOpacity={0}/></linearGradient></defs>
              <CartesianGrid strokeDasharray="3 3" stroke={C.border}/><XAxis dataKey="label" tick={{fill:C.muted,fontSize:9}} interval={1} angle={-30} textAnchor="end" height={45}/>
              <YAxis tick={{fill:C.muted,fontSize:9}} tickFormatter={v=>v.toFixed(2)} domain={["dataMin-.02","dataMax+.02"]}/>
              <Tooltip contentStyle={{background:C.card,border:`1px solid ${C.border}`,borderRadius:8,fontSize:11}} formatter={(v,n)=>[fmt(v)+" €/L",n==="best"?t("evening",lang):n==="worst"?t("morning",lang):t("avg",lang)]}/>
              <Area type="monotone" dataKey="worst" stroke={C.red} strokeWidth={1.5} fillOpacity={0} strokeDasharray="4 4" dot={false}/>
              <Area type="monotone" dataKey="avg" stroke={C.amber} strokeWidth={2} fill="url(#ga)" dot={(p)=>{const{cx,cy,payload}=p;if(payload.isHol||payload.isVac)return <circle cx={cx} cy={cy} r={4} fill={payload.isHol?C.red:C.amber} stroke={C.bg} strokeWidth={2}/>;return <circle cx={cx} cy={cy} r={2} fill={C.amber}/>}}/>
              <Area type="monotone" dataKey="best" stroke={C.green} strokeWidth={1.5} fillOpacity={0} strokeDasharray="4 4" dot={false}/>
            </AreaChart>
          </ResponsiveContainer>
        </div>
        <div style={s.card}>
          <div style={s.cardT}>{t("oilImpact",lang)}</div>
          <div style={{display:"flex",gap:16,alignItems:"center",flexWrap:"wrap"}}>
            <div><div style={{color:C.muted,fontSize:11,marginBottom:3}}>Brent ($/bbl)</div>
              <input type="number" value={brent} onChange={e=>saveBrent(parseFloat(e.target.value)||0)} style={{...s.input,width:90,fontFamily:"monospace",fontSize:16,fontWeight:700}}/></div>
            <div style={{fontSize:20,color:C.dim}}>→</div>
            <div><div style={{color:C.muted,fontSize:11,marginBottom:3}}>{t("rawCost",lang)}</div><div style={{fontFamily:"monospace",fontSize:16,fontWeight:700}}>{(oilImpact.raw*100).toFixed(1)} ct</div></div>
            <div style={{fontSize:20,color:C.dim}}>→</div>
            <div><div style={{color:C.muted,fontSize:11,marginBottom:3}}>{t("estPrice",lang)}</div><div style={{fontFamily:"monospace",fontSize:16,fontWeight:700,color:C.amber}}>{fmt(oilImpact.est)} €</div></div>
          </div>
          <div style={{color:C.muted,fontSize:10,marginTop:8}}>{t("oilDelay",lang)}</div>
        </div>
      </div>
    );
  };

  // ─── HISTORY ────────────────────────────────────────────────
  const renderHistory=()=>(
    <div style={s.card}>
      <div style={s.cardT}>{t("priceHistory",lang)} — {fuel.toUpperCase()}</div>
      {historyData.length<2?<div style={{color:C.muted,fontSize:12,padding:20,textAlign:"center"}}>{t("noHistory",lang)}</div>:(
        <ResponsiveContainer width="100%" height={280}>
          <LineChart data={historyData} margin={{top:10,right:10,bottom:5,left:-15}}>
            <CartesianGrid strokeDasharray="3 3" stroke={C.border}/>
            <XAxis dataKey="time" tick={{fill:C.muted,fontSize:9}}/>
            <YAxis tick={{fill:C.muted,fontSize:9}} domain={["dataMin-.02","dataMax+.02"]} tickFormatter={v=>v.toFixed(2)}/>
            <Tooltip contentStyle={{background:C.card,border:`1px solid ${C.border}`,borderRadius:8,fontSize:11}} formatter={(v,n)=>[fmt(v)+" €/L",n==="avg"?t("average",lang):"Min"]}/>
            <Line type="monotone" dataKey="avg" stroke={C.amber} strokeWidth={2} dot={false}/>
            <Line type="monotone" dataKey="min" stroke={C.green} strokeWidth={1.5} strokeDasharray="4 4" dot={false}/>
          </LineChart>
        </ResponsiveContainer>
      )}
    </div>
  );

  // ─── SETTINGS ───────────────────────────────────────────────
  const renderSettings=()=>(
    <div style={{display:"flex",flexDirection:"column",gap:12,maxWidth:500}}>
      {/* API Key */}
      <div style={s.card}>
        <div style={s.cardT}>{t("apiKey",lang)}</div>
        <div style={{color:C.muted,fontSize:12,marginBottom:8}}>{t("apiKeyDesc",lang)}: <a href="https://creativecommons.tankerkoenig.de" target="_blank" style={{color:C.amber}}>tankerkoenig.de</a></div>
        {apiKey?(<div><span style={s.badge(C.green)}>✓ {t("connected",lang)}</span><span style={{color:C.muted,fontFamily:"monospace",fontSize:11,marginLeft:8}}>{apiKey.slice(0,8)}…</span><br/><button onClick={clearKey} style={{...s.btnM,marginTop:8}}>{t("removeKey",lang)}</button></div>):(
          <div style={{display:"flex",gap:6}}><input value={keyInput} onChange={e=>setKeyInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&saveKey()} placeholder="xxxxxxxx-xxxx-..." style={{...s.input,fontFamily:"monospace"}}/><button onClick={saveKey} style={s.btn}>{t("save",lang)}</button></div>
        )}
      </div>
      {/* Location */}
      <div style={s.card}>
        <div style={s.cardT}>{t("location",lang)}: {loc.name}</div>
        <div style={{display:"flex",gap:6,marginBottom:8}}>
          <input value={locSearch} onChange={e=>{setLocSearch(e.target.value);if(e.target.value.length>=2)searchLocation(e.target.value)}} placeholder={t("searchPlace",lang)} style={s.input}/>
          <button onClick={useGPS} style={s.btnM}>{t("useMyLocation",lang)}</button>
        </div>
        {locResults.length>0&&<div style={{border:`1px solid ${C.border}`,borderRadius:7,marginBottom:8,overflow:"hidden"}}>
          {locResults.map((r,i)=>(
            <div key={i} style={{padding:"8px 10px",fontSize:12,cursor:"pointer",borderBottom:i<locResults.length-1?`1px solid ${C.border}`:"",background:C.card}} onClick={()=>{saveLoc(r);setLocResults([]);setLocSearch("")}}
              onMouseEnter={e=>e.target.style.background=C.border} onMouseLeave={e=>e.target.style.background=C.card}>{r.name}</div>
          ))}
        </div>}
        <div style={{marginBottom:4}}>
          <div style={{display:"flex",justifyContent:"space-between",fontSize:12,color:C.muted,marginBottom:4}}>
            <span>{t("radius",lang)}</span><span style={{fontFamily:"monospace",fontWeight:700}}>{rad} km</span>
          </div>
          <input type="range" min="5" max="25" step="5" value={rad} onChange={e=>saveRad(+e.target.value)} className="slide-range"/>
          <div style={{display:"flex",justifyContent:"space-between",fontSize:10,color:C.dim}}><span>5</span><span>10</span><span>15</span><span>20</span><span>25</span></div>
        </div>
      </div>
      {/* Theme + Language */}
      <div style={s.card}>
        <div style={s.cardT}>{t("theme",lang)}</div>
        <div style={{display:"flex",gap:6,marginBottom:16}}>
          {["dark","light"].map(v=><div key={v} style={s.pill(theme===v)} onClick={()=>saveTheme(v)}>{t(v,lang)}</div>)}
        </div>
        <div style={s.cardT}>{t("language",lang)}</div>
        <div style={{display:"flex",gap:6}}>
          {Object.entries(LANGS).map(([k,v])=><div key={k} style={s.pill(lang===k)} onClick={()=>saveLang(k)}>{v}</div>)}
        </div>
      </div>
      {/* Price Alert */}
      <div style={s.card}>
        <div style={s.cardT}>{t("priceAlert",lang)}</div>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}>
          <span style={{fontSize:12,color:C.muted}}>{t("alertDesc",lang)}</span>
          <input type="number" step="0.01" value={alertPrice||""} onChange={e=>saveAlert(parseFloat(e.target.value)||0)} placeholder="1.85" style={{...s.input,width:80,fontFamily:"monospace"}}/>
          <span style={{fontSize:12}}>€/L</span>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <div onClick={toggleAlert} style={{width:40,height:22,borderRadius:11,background:alertOn?C.green:C.border,cursor:"pointer",position:"relative",transition:"background .2s"}}>
            <div style={{width:18,height:18,borderRadius:9,background:"#fff",position:"absolute",top:2,left:alertOn?20:2,transition:"left .2s"}}/>
          </div>
          <span style={{fontSize:12,color:alertOn?C.green:C.muted}}>{alertOn?t("alertEnabled",lang):t("alertOff",lang)}</span>
        </div>
      </div>
      {/* Install */}
      {deferredPrompt&&(
        <div style={s.card}>
          <button style={s.btn} onClick={async()=>{deferredPrompt.prompt();await deferredPrompt.userChoice;setDeferredPrompt(null)}}>📲 {t("installApp",lang)}</button>
        </div>
      )}
      {/* Sources */}
      <div style={s.card}>
        <div style={s.cardT}>{t("sources",lang)}</div>
        <div style={{fontSize:12,color:C.muted,lineHeight:1.8}}>
          📊 MTS-K via Tankerkönig API<br/>📈 Bundeskartellamt MTS<br/>🏖 Ferien: NI, ST, NW, BB, TH<br/>🛢 Brent Crude (manuell)
        </div>
      </div>
    </div>
  );

  // ─── RENDER ─────────────────────────────────────────────────
  return(
    <div style={{minHeight:"100vh"}}>
      <DetailModal/>
      <div style={s.header}>
        <div style={s.logo}>
          <div style={s.logoIcon}>⛽</div>
          <div><div style={{fontSize:16,fontWeight:700,letterSpacing:"-.02em"}}>TankRadar</div><div style={{fontSize:10,color:C.muted}}>{loc.name?.split(",")[0]} · {rad} km</div></div>
        </div>
        <div style={s.pills}>
          {["e10","e5","diesel"].map(f=><div key={f} style={s.pill(fuel===f)} onClick={()=>saveFuel(f)}>{f==="diesel"?"Diesel":f.toUpperCase()}</div>)}
          {!demo&&<span style={{fontSize:10,color:C.dim,fontFamily:"monospace",marginLeft:4}}>{loading?"…":lastFetch?lastFetch.toLocaleTimeString("de-DE",{hour:"2-digit",minute:"2-digit"}):""}</span>}
        </div>
      </div>
      <div style={s.tabs}>{TABS.map(tb=><div key={tb.id} style={s.tab(tab===tb.id)} onClick={()=>setTab(tb.id)}>{tb.icon} {t(tb.id,lang)}</div>)}</div>
      <div style={s.content}>
        {tab==="dashboard"&&renderDashboard()}
        {tab==="stations"&&renderStations()}
        {tab==="map"&&renderMap()}
        {tab==="patterns"&&renderPatterns()}
        {tab==="forecast"&&renderForecast()}
        {tab==="history"&&renderHistory()}
        {tab==="settings"&&renderSettings()}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(TankRadar));
</script>
</body>
</html>
