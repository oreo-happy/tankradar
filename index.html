<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans','Segoe UI',system-ui,sans-serif;font-size:14px;transition:background .3s,color .3s}
body.dark{background:#06080f;color:#e2e8f0}
body.light{background:#f8fafc;color:#1e293b}
#root{min-height:100vh}
.dark ::-webkit-scrollbar{width:6px;height:6px}
.dark ::-webkit-scrollbar-thumb{background:#1e2736;border-radius:3px}
.light ::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px}
input[type=number]::-webkit-inner-spin-button{opacity:1}
.leaflet-container{border-radius:12px;z-index:1}
.station-popup .leaflet-popup-content-wrapper{background:#0d1117;color:#e2e8f0;border:1px solid #1e2736;border-radius:10px}
.light .station-popup .leaflet-popup-content-wrapper{background:#fff;color:#1e293b;border:1px solid #e2e8f0}
.station-popup .leaflet-popup-tip{background:#0d1117}
.light .station-popup .leaflet-popup-tip{background:#fff}
.price-marker{background:none;border:none}
.price-label{padding:2px 6px;border-radius:6px;font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;white-space:nowrap;text-align:center;box-shadow:0 2px 6px rgba(0,0,0,.3)}
.slide-range{-webkit-appearance:none;appearance:none;width:100%;height:4px;border-radius:2px;outline:none;cursor:pointer}
.dark .slide-range{background:#1e2736}
.light .slide-range{background:#cbd5e1}
.slide-range::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:#f59e0b;cursor:pointer;border:2px solid #06080f}
.light .slide-range::-webkit-slider-thumb{border-color:#f8fafc}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.pulsing{animation:pulse 2s infinite}
</style>

  {id:"payback",name:"Payback",desc:"Punkte bei Aral",icon:"🔵",brands:["ARAL","Aral"],type:"points",basePointsPer:1,pointValueEur:0.01,defaultMultiplier:1},

  ]},

  {id:"amex",name:"AmEx Cashback",desc:"Kreditkarten-Cashback",icon:"💳",type:"percent",percent:1,allBrands:true},
  {id:"custom",name:"Eigene Karte",desc:"Manueller Rabatt",icon:"🏷",type:"flat",discountCt:0,allBrands:true},
];

function calcDiscount(brand,pricePerL,activeCards){
  let totalCt=0;let details=[];
  for(const ac of activeCards){
    const def=DISCOUNT_CARDS.find(d=>d.id===ac.id);
    if(!def)continue;
    if(def.type==="multi"){
      for(const rule of def.rules){
        if(rule.brands.some(b=>brand?.toUpperCase().includes(b.toUpperCase()))){
          totalCt+=rule.discountCt;
          details.push({name:def.name,ct:rule.discountCt});
          break;
        }
      }
    }else if(def.type==="points"){
      const mult=ac.multiplier||def.defaultMultiplier;
      const pointsPerL=def.basePointsPer*mult;
      const eurPerL=pointsPerL*def.pointValueEur;
      const ct=+(eurPerL*100).toFixed(2);
      if(def.brands.some(b=>brand?.toUpperCase().includes(b.toUpperCase()))){
        totalCt+=ct;
        details.push({name:`${def.name} (${mult}x)`,ct});
      }
    }else if(def.type==="flat"){
      const ct=ac.discountCt||def.discountCt||0;
      if(ct>0&&(def.allBrands||def.brands?.some(b=>brand?.toUpperCase().includes(b.toUpperCase())))){
        totalCt+=ct;
        details.push({name:def.name,ct});
      }
    }else if(def.type==="percent"){
      const pct=ac.percent||def.percent||0;
      const ct=+(pricePerL*pct).toFixed(2);
      if(ct>0){totalCt+=ct;details.push({name:`${def.name} (${pct}%)`,ct})}
    }
  }
  return{totalCt:+totalCt.toFixed(2),details,adjustedPrice:+(pricePerL-totalCt/100).toFixed(3)};
}

function vacProx(date){let m=Infinity,c=null;const d=typeof date==="string"?toDate(date):date;for(const v of VACATIONS){const s=toDate(v.s),diff=daysB(d,s);if(diff>=-2&&diff<=7&&Math.abs(diff)<Math.abs(m)){m=diff;c=v}}return{days:m,vac:c}}
function holProx(date){const d=typeof date==="string"?toDate(date):date;for(const h of HOLIDAYS){const diff=daysB(d,toDate(h.d));if(diff>=-2&&diff<=2)return{days:diff,hol:h}}return null}
function fcDelta(date,hour=12){const d=typeof date==="string"?toDate(date):new Date(date);const dow=(d.getDay()+6)%7;let delta=HOURLY_DELTA[hour]+DAILY_DELTA[dow];const v=vacProx(d);if(v.vac&&v.days>=-2&&v.days<=3)delta+=4;const h=holProx(d);if(h&&h.days>=-1&&h.days<=0)delta+=5;return delta}
function bestTimeNow(){const h=new Date().getHours();if(h<18)return{label:"19:00–20:00",wait:true};if(h<=20)return{label:"Jetzt!",wait:false};return{label:"morgen 19:00",wait:true}}

  const heatmapData=useMemo(()=>{
    const cells=[];
    for(let d=0;d<7;d++){
      for(let h=0;h<24;h++){
        const val=HOURLY_DELTA[h]+DAILY_DELTA[d];
        cells.push({day:d,hour:h,val});
      }
    }

  },[]);
  const heatMin=Math.min(...heatmapData.map(c=>c.val));

  const heatColor=(val)=>{
    const norm=(val-heatMin)/(heatMax-heatMin); // 0=cheapest, 1=most expensive
    if(norm<0.25)return theme==="dark"?"#064e3b":"#d1fae5"; // deep green
    if(norm<0.4)return theme==="dark"?"#065f46":"#a7f3d0";
    if(norm<0.55)return theme==="dark"?"#1e3a2a":"#fef3c7"; // neutral
    if(norm<0.7)return theme==="dark"?"#78350f":"#fde68a"; // warm
    if(norm<0.85)return theme==="dark"?"#7f1d1d":"#fca5a5";
    return theme==="dark"?"#991b1b":"#f87171"; // hot red
  };

          <div style={{color:C.muted,fontSize:11,marginTop:4}}>{fillupStats.litersThis} L · {fillupStats.count} Tankvorgänge</div>
        </div>
        <div style={s.card}>
          <div style={s.cardT}>{t("lastMonth",lang)}</div>
          <div style={{...s.big,fontSize:28,color:C.text}}>{fillupStats.lastMonth.toFixed(2)} €</div>
          <div style={{color:C.muted,fontSize:11,marginTop:4}}>
            {fillupStats.thisMonth>0&&fillupStats.lastMonth>0&&(
              <span style={{color:fillupStats.thisMonth<fillupStats.lastMonth?C.green:C.red}}>
                {fillupStats.thisMonth<fillupStats.lastMonth?"↓":"↑"} {Math.abs(fillupStats.thisMonth-fillupStats.lastMonth).toFixed(2)} €
              </span>
            )}
          </div>
        </div>
        <div style={s.card}>
          <div style={s.cardT}>{t("savedVsAvg",lang)}</div>
          <div style={{...s.big,fontSize:28,color:fillupStats.savedVsAvg>=0?C.green:C.red}}>{fillupStats.savedVsAvg>=0?"+":""}{fillupStats.savedVsAvg.toFixed(2)} €</div>
          <div style={{color:C.muted,fontSize:11,marginTop:4}}>vs. Ø {fmt(fillupStats.avgPrice)} €/L</div>
        </div>
      </div>
      {/* Log button + form */}
      <div style={s.card}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:showLogForm?12:0}}>
          <div style={s.cardT}>{t("tracker",lang)}</div>
          <button style={s.btn} onClick={()=>setShowLogForm(!showLogForm)}>{showLogForm?"✕":t("logFillup",lang)}</button>
        </div>
        {showLogForm&&(
          <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:12,padding:12,borderRadius:8,background:C.bg}}>
            <div style={{flex:"1 1 80px"}}>
              <div style={{fontSize:10,color:C.muted,marginBottom:3}}>{t("liters",lang)}</div>
              <input type="number" step="0.1" value={logLiters} onChange={e=>setLogLiters(e.target.value)} placeholder="45.0" style={{...s.input,fontFamily:"monospace"}}/>
            </div>
            <div style={{flex:"1 1 80px"}}>
              <div style={{fontSize:10,color:C.muted,marginBottom:3}}>{t("pricePerL",lang)} (€)</div>
              <input type="number" step="0.001" value={logPrice} onChange={e=>setLogPrice(e.target.value)} placeholder="1.859" style={{...s.input,fontFamily:"monospace"}}/>
            </div>
            <div style={{flex:"2 1 120px"}}>
              <div style={{fontSize:10,color:C.muted,marginBottom:3}}>{t("stationName",lang)}</div>
              <input value={logStation} onChange={e=>setLogStation(e.target.value)} placeholder={cheapest?.brand||"ARAL"} style={s.input}/>
            </div>
            <div style={{flex:"0 0 auto",display:"flex",alignItems:"flex-end"}}>
              <button onClick={logFillup} style={s.btn}>💾 {t("save",lang)}</button>
            </div>
          </div>
        )}
        {/* Fill-up list */}
        {fillups.length===0?<div style={{color:C.muted,fontSize:12,textAlign:"center",padding:16}}>{t("noFillups",lang)}</div>:(
          fillups.slice(0,20).map((f,i)=>(
            <div key={f.id} style={{...s.row,gap:8}}>
              <div style={{flex:1}}>
                <div style={{fontWeight:600,fontSize:12}}>{f.station} · {f.fuel?.toUpperCase()}</div>
                <div style={{color:C.muted,fontSize:11}}>{new Date(f.ts).toLocaleDateString("de-DE",{day:"2-digit",month:"2-digit",year:"2-digit"})} · {f.liters}L × {fmt(f.pricePerL)} €</div>
              </div>
              <div style={{fontFamily:"monospace",fontSize:15,fontWeight:700}}>{f.total.toFixed(2)} €</div>
              <div style={{cursor:"pointer",color:C.dim,fontSize:14}} onClick={()=>deleteFillup(f.id)}>🗑</div>
            </div>
          ))
        )}
      </div>
      {/* Tank level slider */}
      <div style={s.card}>
        <div style={s.cardT}>{t("fuelLevel",lang)}: {Math.round(currentFuel)}% (~{tankAdvisor.litersLeft} L)</div>
        <input type="range" min="0" max="100" step="5" value={currentFuel} onChange={e=>saveCurrentFuel(+e.target.value)} className="slide-range"/>
        <div style={{display:"flex",justifyContent:"space-between",fontSize:10,color:C.dim,marginTop:4}}><span>Leer</span><span>Voll</span></div>
      </div>
    </div>
  );

  // ─── HISTORY ────────────────────────────────────────────────
  const renderHistory=()=>(
    <div style={s.card}>
      <div style={s.cardT}>{t("priceHistory",lang)} — {fuel.toUpperCase()}</div>
      {historyData.length<2?<div style={{color:C.muted,fontSize:12,padding:20,textAlign:"center"}}>{t("noHistory",lang)}</div>:(
        <ResponsiveContainer width="100%" height={280}>
          <LineChart data={historyData} margin={{top:10,right:10,bottom:5,left:-15}}>
            <CartesianGrid strokeDasharray="3 3" stroke={C.border}/>
            <XAxis dataKey="time" tick={{fill:C.muted,fontSize:9}}/>
            <YAxis tick={{fill:C.muted,fontSize:9}} domain={["dataMin-.02","dataMax+.02"]} tickFormatter={v=>v.toFixed(2)}/>
            <Tooltip contentStyle={{background:C.card,border:`1px solid ${C.border}`,borderRadius:8,fontSize:11}} formatter={(v,n)=>[fmt(v)+" €/L",n==="avg"?t("average",lang):"Min"]}/>
            <Line type="monotone" dataKey="avg" stroke={C.amber} strokeWidth={2} dot={false}/>
            <Line type="monotone" dataKey="min" stroke={C.green} strokeWidth={1.5} strokeDasharray="4 4" dot={false}/>
          </LineChart>
        </ResponsiveContainer>
      )}
    </div>
  );

  // ─── SETTINGS ───────────────────────────────────────────────
  const renderSettings=()=>(
    <div style={{display:"flex",flexDirection:"column",gap:12,maxWidth:500}}>
      {/* API Key */}
      <div style={s.card}>
        <div style={s.cardT}>{t("apiKey",lang)}</div>
        <div style={{color:C.muted,fontSize:12,marginBottom:8}}>{t("apiKeyDesc",lang)}: <a href="https://creativecommons.tankerkoenig.de" target="_blank" style={{color:C.amber}}>tankerkoenig.de</a></div>
        {apiKey?(<div><span style={s.badge(C.green)}>✓ {t("connected",lang)}</span><span style={{color:C.muted,fontFamily:"monospace",fontSize:11,marginLeft:8}}>{apiKey.slice(0,8)}…</span><br/><button onClick={clearKey} style={{...s.btnM,marginTop:8}}>{t("removeKey",lang)}</button></div>):(
          <div style={{display:"flex",gap:6}}><input value={keyInput} onChange={e=>setKeyInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&saveKey()} placeholder="xxxxxxxx-xxxx-..." style={{...s.input,fontFamily:"monospace"}}/><button onClick={saveKey} style={s.btn}>{t("save",lang)}</button></div>
        )}
      </div>
      {/* Location */}
      <div style={s.card}>
        <div style={s.cardT}>{t("location",lang)}: {loc.name}</div>
        <div style={{display:"flex",gap:6,marginBottom:8}}>
          <input value={locSearch} onChange={e=>{setLocSearch(e.target.value);if(e.target.value.length>=2)searchLocation(e.target.value)}} placeholder={t("searchPlace",lang)} style={s.input}/>
          <button onClick={useGPS} style={s.btnM}>{t("useMyLocation",lang)}</button>
        </div>
        {locResults.length>0&&<div style={{border:`1px solid ${C.border}`,borderRadius:7,marginBottom:8,overflow:"hidden"}}>
          {locResults.map((r,i)=>(
            <div key={i} style={{padding:"8px 10px",fontSize:12,cursor:"pointer",borderBottom:i<locResults.length-1?`1px solid ${C.border}`:"",background:C.card}} onClick={()=>{saveLoc(r);setLocResults([]);setLocSearch("")}}
              onMouseEnter={e=>e.target.style.background=C.border} onMouseLeave={e=>e.target.style.background=C.card}>{r.name}</div>
          ))}
        </div>}
        <div style={{marginBottom:4}}>
          <div style={{display:"flex",justifyContent:"space-between",fontSize:12,color:C.muted,marginBottom:4}}>
            <span>{t("radius",lang)}</span><span style={{fontFamily:"monospace",fontWeight:700}}>{rad} km</span>
          </div>
          <input type="range" min="5" max="25" step="5" value={rad} onChange={e=>saveRad(+e.target.value)} className="slide-range"/>
          <div style={{display:"flex",justifyContent:"space-between",fontSize:10,color:C.dim}}><span>5</span><span>10</span><span>15</span><span>20</span><span>25</span></div>
        </div>
      </div>
      {/* Theme + Language */}
      <div style={s.card}>
        <div style={s.cardT}>{t("theme",lang)}</div>
        <div style={{display:"flex",gap:6,marginBottom:16}}>
          {["dark","light"].map(v=><div key={v} style={s.pill(theme===v)} onClick={()=>saveTheme(v)}>{t(v,lang)}</div>)}
        </div>
        <div style={s.cardT}>{t("language",lang)}</div>
        <div style={{display:"flex",gap:6}}>
          {Object.entries(LANGS).map(([k,v])=><div key={k} style={s.pill(lang===k)} onClick={()=>saveLang(k)}>{v}</div>)}
        </div>
      </div>
      {/* Vehicle */}
      <div style={s.card}>
        <div style={s.cardT}>🚗 {t("car",lang)}</div>
        {/* Car search */}
        <div style={{marginBottom:12}}>
          <div style={{fontSize:11,color:C.muted,marginBottom:3}}>{lang==="de"?"Auto suchen…":lang==="tr"?"Araç ara…":"Search car…"}</div>
          <input value={carSearch} onChange={e=>{setCarSearch(e.target.value);setCarResults(searchCars(e.target.value))}} placeholder="z.B. Golf GTI, BMW 320d, Audi A3…" style={s.input}/>
          {carResults.length>0&&(
            <div style={{border:`1px solid ${C.border}`,borderRadius:7,marginTop:4,overflow:"hidden"}}>
              {carResults.map((car,i)=>(
                <div key={i} style={{padding:"8px 10px",fontSize:12,cursor:"pointer",borderBottom:i<carResults.length-1?`1px solid ${C.border}`:"",background:C.card,display:"flex",justifyContent:"space-between"}}
                  onClick={()=>selectCar(car)} onMouseEnter={e=>e.currentTarget.style.background=C.border} onMouseLeave={e=>e.currentTarget.style.background=C.card}>
                  <span style={{fontWeight:600}}>{car.name}</span>
                  <span style={{color:C.muted,fontSize:11}}>{car.tank}L · {car.consumption}L/100km · {car.fuel==="ev"?"⚡ EV":car.fuel==="diesel"?"🟡 Diesel":"⛽ Benzin"}</span>
                </div>
              ))}
            </div>
          )}
        </div>
        {/* Selected car info */}
        {carName&&(
          <div style={{padding:10,borderRadius:8,background:C.amberGlow,border:`1px solid ${C.amber}`,marginBottom:12,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div>
              <div style={{fontWeight:700,fontSize:13}}>{carName}</div>
              <div style={{color:C.muted,fontSize:11}}>{tankSize}L Tank · {consumption} L/100km ({DRIVE_STYLES.find(d=>d.id===driveStyle)?.label?.[lang]||driveStyle})</div>
            </div>
            <div style={{cursor:"pointer",color:C.muted,fontSize:14}} onClick={()=>{setCarName("");S.del("car_name")}}>✕</div>
          </div>
        )}
        {/* Driving style */}
        <div style={{marginBottom:12}}>
          <div style={{fontSize:11,color:C.muted,marginBottom:6}}>{lang==="de"?"Fahrstil":lang==="tr"?"Sürüş tarzı":"Driving style"}</div>
          <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
            {DRIVE_STYLES.map(ds=>(
              <div key={ds.id} style={s.pill(driveStyle===ds.id)} onClick={()=>changeDriveStyle(ds.id)}>
                {ds.label[lang]||ds.label.de}
              </div>
            ))}
          </div>
          {driveStyle!=="normal"&&(
            <div style={{fontSize:10,color:C.muted,marginTop:4}}>
              {lang==="de"?`Faktor ×${DRIVE_STYLES.find(d=>d.id===driveStyle)?.factor} auf Herstellerverbrauch`:`Factor ×${DRIVE_STYLES.find(d=>d.id===driveStyle)?.factor} on manufacturer consumption`}
            </div>
          )}
        </div>
        {/* Manual override */}
        <div style={{display:"flex",gap:12,flexWrap:"wrap",marginBottom:10}}>
          <div style={{flex:"1 1 100px"}}>
            <div style={{fontSize:11,color:C.muted,marginBottom:3}}>{t("tankSize",lang)} (L)</div>
            <input type="number" value={tankSize} onChange={e=>saveTankSize(parseFloat(e.target.value)||0)} style={{...s.input,fontFamily:"monospace"}}/>
          </div>
          <div style={{flex:"1 1 100px"}}>
            <div style={{fontSize:11,color:C.muted,marginBottom:3}}>{t("consumption",lang)} (L/100km)</div>
            <input type="number" step="0.1" value={consumption} onChange={e=>saveConsumption(parseFloat(e.target.value)||0)} style={{...s.input,fontFamily:"monospace"}}/>
          </div>
        </div>
        {/* Fuel level */}
        <div>
          <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:C.muted,marginBottom:4}}>
            <span>{t("fuelLevel",lang)}</span><span style={{fontFamily:"monospace",fontWeight:700}}>{Math.round(currentFuel)}%</span>
          </div>
          <input type="range" min="0" max="100" step="5" value={currentFuel} onChange={e=>saveCurrentFuel(+e.target.value)} className="slide-range"/>
        </div>
      </div>
      {/* Discount Cards */}
      <div style={s.card}>
        <div style={s.cardT}>🏷 Rabattkarten / Discount Cards</div>
        <div style={{fontSize:12,color:C.muted,marginBottom:12}}>
          {lang==="de"?"Aktive Karten werden auf Preise angerechnet.":lang==="tr"?"Aktif kartlar fiyatlara uygulanır.":"Active cards are applied to displayed prices."}
        </div>
        {DISCOUNT_CARDS.map(card=>{
          const isActive=activeCards.some(c=>c.id===card.id);
          const ac=activeCards.find(c=>c.id===card.id);
          return(
            <div key={card.id} style={{padding:10,borderRadius:8,border:`1px solid ${isActive?C.green:C.border}`,marginBottom:8,background:isActive?"rgba(16,185,129,.04)":"transparent"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  <span style={{fontSize:16}}>{card.icon}</span>
                  <div>
                    <div style={{fontWeight:600,fontSize:13}}>{card.name}</div>
                    <div style={{fontSize:11,color:C.muted}}>{card.desc}</div>
                  </div>
                </div>
                <div onClick={()=>toggleCard(card.id)} style={{width:40,height:22,borderRadius:11,background:isActive?C.green:C.border,cursor:"pointer",position:"relative",transition:"background .2s"}}>
                  <div style={{width:18,height:18,borderRadius:9,background:"#fff",position:"absolute",top:2,left:isActive?20:2,transition:"left .2s"}}/>
                </div>
              </div>
              {isActive&&card.type==="points"&&(
                <div style={{marginTop:8,display:"flex",alignItems:"center",gap:8}}>
                  <span style={{fontSize:11,color:C.muted}}>Punkte-Multiplikator:</span>
                  {[1,2,3,5,7,10].map(m=>(
                    <div key={m} style={{...s.pill(ac?.multiplier===m),padding:"3px 8px",fontSize:11}} onClick={()=>updateCard(card.id,"multiplier",m)}>{m}x</div>
                  ))}
                </div>
              )}
              {isActive&&card.type==="flat"&&(
                <div style={{marginTop:8,display:"flex",alignItems:"center",gap:8}}>
                  <span style={{fontSize:11,color:C.muted}}>Rabatt:</span>
                  <input type="number" step="0.5" value={ac?.discountCt||""} onChange={e=>updateCard(card.id,"discountCt",parseFloat(e.target.value)||0)} placeholder="2.0" style={{...s.input,width:70,fontFamily:"monospace"}}/>
                  <span style={{fontSize:11}}>ct/L</span>
                </div>
              )}
              {isActive&&card.type==="percent"&&(
                <div style={{marginTop:8,display:"flex",alignItems:"center",gap:8}}>
                  <span style={{fontSize:11,color:C.muted}}>Cashback:</span>
                  <input type="number" step="0.1" value={ac?.percent||""} onChange={e=>updateCard(card.id,"percent",parseFloat(e.target.value)||0)} placeholder="1.0" style={{...s.input,width:70,fontFamily:"monospace"}}/>
                  <span style={{fontSize:11}}>%</span>
                </div>
              )}
              {isActive&&card.type==="multi"&&(
                <div style={{marginTop:8,fontSize:11,color:C.muted}}>
                  {card.rules.map((r,i)=>(
                    <div key={i}>• {r.brands.join(", ")}: <strong>-{r.discountCt} ct/L</strong></div>
                  ))}
                </div>
              )}
            </div>
          );
        })}
        {activeCards.length>0&&(
          <div style={{marginTop:8,padding:8,borderRadius:6,background:C.amberGlow,fontSize:11,color:C.amber}}>
            💡 {lang==="de"?"Rabatte werden in der Tankstellen-Liste und im Top 5 angezeigt.":lang==="tr"?"İndirimler istasyon listesinde gösterilir.":"Discounts are shown in the station list and top 5."}
          </div>
        )}
      </div>
      {/* Price Alert */}
      <div style={s.card}>
        <div style={s.cardT}>{t("priceAlert",lang)}</div>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}>
          <span style={{fontSize:12,color:C.muted}}>{t("alertDesc",lang)}</span>
          <input type="number" step="0.01" value={alertPrice||""} onChange={e=>saveAlert(parseFloat(e.target.value)||0)} placeholder="1.85" style={{...s.input,width:80,fontFamily:"monospace"}}/>
          <span style={{fontSize:12}}>€/L</span>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <div onClick={toggleAlert} style={{width:40,height:22,borderRadius:11,background:alertOn?C.green:C.border,cursor:"pointer",position:"relative",transition:"background .2s"}}>
            <div style={{width:18,height:18,borderRadius:9,background:"#fff",position:"absolute",top:2,left:alertOn?20:2,transition:"left .2s"}}/>
          </div>
          <span style={{fontSize:12,color:alertOn?C.green:C.muted}}>{alertOn?t("alertEnabled",lang):t("alertOff",lang)}</span>
        </div>
      </div>
      {/* Install */}
      {deferredPrompt&&(
        <div style={s.card}>
          <button style={s.btn} onClick={async()=>{deferredPrompt.prompt();await deferredPrompt.userChoice;setDeferredPrompt(null)}}>📲 {t("installApp",lang)}</button>
        </div>
      )}
      {/* Sources */}
      <div style={s.card}>
        <div style={s.cardT}>{t("sources",lang)}</div>
        <div style={{fontSize:12,color:C.muted,lineHeight:1.8}}>
          📊 MTS-K via Tankerkönig API<br/>📈 Bundeskartellamt MTS<br/>🏖 Ferien: NI, ST, NW, BB, TH<br/>🛢 Brent Crude (manuell)
        </div>
      </div>
    </div>
  );

  // ─── RENDER ─────────────────────────────────────────────────
  return(
    <div style={{minHeight:"100vh"}}>
      <DetailModal/>
      <div style={s.header}>
        <div style={s.logo}>
          <div style={s.logoIcon}>⛽</div>
          <div><div style={{fontSize:16,fontWeight:700,letterSpacing:"-.02em"}}>TankRadar</div><div style={{fontSize:10,color:C.muted}}>{loc.name?.split(",")[0]} · {rad} km</div></div>
        </div>
        <div style={s.pills}>
          {["e10","e5","diesel"].map(f=><div key={f} style={s.pill(fuel===f)} onClick={()=>saveFuel(f)}>{f==="diesel"?"Diesel":f.toUpperCase()}</div>)}
          {!demo&&<span style={{fontSize:10,color:C.dim,fontFamily:"monospace",marginLeft:4}}>{loading?"…":lastFetch?lastFetch.toLocaleTimeString("de-DE",{hour:"2-digit",minute:"2-digit"}):""}</span>}
        </div>
      </div>
      <div style={s.tabs}>{TABS.map(tb=><div key={tb.id} style={s.tab(tab===tb.id)} onClick={()=>setTab(tb.id)}>{tb.icon} {t(tb.id,lang)}</div>)}</div>
      <div style={s.content}>
        {tab==="dashboard"&&renderDashboard()}
        {tab==="stations"&&renderStations()}
        {tab==="map"&&renderMap()}
        {tab==="patterns"&&renderPatterns()}
        {tab==="forecast"&&renderForecast()}
        {tab==="tracker"&&renderTracker()}
        {tab==="history"&&renderHistory()}
        {tab==="settings"&&renderSettings()}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(TankRadar));
</script>
</body>
</html>
